// ═══════════════════════════════════════════════════════════════════════════
//  INTRO SEQUENCE — Sutera blueprint + glitch-mask reveal + crosshair draw
//
//  Слои (z-index):
//    1. blueprint  — большая SVG-сетка (вертикали 25/50/75%, горизонтали 33/66%)
//    2. stage      — тайтл + подзаголовок, отрендерены сразу финально
//    3. crosshair  — SVG-крест/прицел, рисуется через stroke-dashoffset
//    4. glitch-mask— ~169 квадратов (13 cols × ~14 rows), random-stagger dissolve
//    5. chrome     — углы, loading%, мета-коды
//
//  Таймлайн (мс от mount):
//    0           — blueprint: линии fade-in (0.6s easing), маленькие квадраты scale-in (0.5s @0.4s)
//    0..1900     — glitch-mask: 169 cells, random stagger fade-out за 1.7s, syncro c loading%
//    300..1700   — crosshair: stroke draws-in за 1.4s, потом dot pulse-in
//    2000        — subtitle scramble decrypt стартует (1s)
//    3000        — hold 600ms
//    3600        — fade-out 550ms
//    4150        — onDone
//
//  Skip — fast-forward по клику.
// ═══════════════════════════════════════════════════════════════════════════

const INTRO_STORAGE_KEY = 'coldscales:intro_seen_at';
const INTRO_TTL_MS = 7 * 24 * 60 * 60 * 1000;  // 7 дней

// Текст-заглушки (полируется в финальной итерации)
const INTRO_TITLE = 'ХОЛОДНЫЕ\nВЕСЫ';
const INTRO_SUBTITLE = 'NOT A STUDIO — COLD JUDGMENT';

// Параметры маски
const GLITCH_COLS = 13;             // 100/13 ≈ 7.69% → 13 столбцов точно как у Sutera
const GLITCH_DISSOLVE_DURATION = 1700; // мс на полное растворение всей маски
const GLITCH_CELL_FADE_MS = 600;    // длительность фейда одной ячейки
const INTRO_SETTLED_DELAY = 250;
const INTRO_LEAVE_DELAY = 600;
const INTRO_FADE_OUT_MS = 550;
const INTRO_SKIP_FADE_MS = 350;
const INTRO_REDUCED_MOTION_MS = 120;

// Алфавит для scramble (моноширинные глифы)
const SCRAMBLE_GLYPHS = '@#$%&*+=/\\<>?!~|';

// ── Утилиты ───────────────────────────────────────────────────────────────
function rng(seed) {
  // Mulberry32: детерминированный PRNG
  let t = seed >>> 0;
  return () => {
    t = (t + 0x6D2B79F5) >>> 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════════════════════════════════
//  GlitchMask — переиспользуемая компонента
//  Рендерит сетку из cols × rows квадратов с varied opacity + mix-blend-mode.
//  Управляется через prop `progress` (0..1) — какая доля ячеек уже исчезла.
//  Также имеет режим `idle` для лёгкого ambient-мерцания (для in-app использования).
// ═══════════════════════════════════════════════════════════════════════════
function GlitchMask({
  cols = GLITCH_COLS,
  progress = 0,         // 0..1 — доля исчезнувших ячеек
  rows,                 // если не указано — считается из aspect-ratio контейнера
  seed = 42,
  baseOpacity = 0.92,   // максимум для ячейки в "закрытом" состоянии
  blendMode = 'normal', // 'normal' | 'difference' | 'multiply'
  idle = false,         // ambient-мерцание (для in-app overlay)
  className = '',
  style = {},
}) {
  const containerRef = useRef(null);
  const [computedRows, setComputedRows] = useState(rows || 14);

  // Авто-расчёт rows под фактический размер контейнера
  useEffect(() => {
    if (rows) { setComputedRows(rows); return; }
    const el = containerRef.current;
    if (!el) return;
    const measure = () => {
      const w = el.offsetWidth;
      const h = el.offsetHeight;
      if (w > 0 && h > 0) {
        const cellW = w / cols;
        setComputedRows(Math.ceil(h / cellW) + 1);
      }
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    return () => ro.disconnect();
  }, [cols, rows]);

  // Стабильные параметры ячеек: random opacity, blend, dissolve-order
  const cells = useMemo(() => {
    const rand = rng(seed);
    const total = cols * computedRows;
    const arr = [];
    for (let i = 0; i < total; i++) {
      const r = rand();
      const op = baseOpacity * (0.95 + r * 0.05);
      // Difference-blend используется редко (~5%) — на белом фоне он бы дал
      // тот же белый, но если над цветом будет работать как глитч-инверсия.
      const useBlend = rand() < 0.05;
      // dissolveOrder сжат в 0..0.85 — все ячейки успевают начать исчезновение
      // к 85% прогресса, оставшиеся 15% времени их CSS-transition завершается.
      // Это гарантирует полное растворение маски синхронно с loading→100%.
      const dissolveOrder = rand() * 0.85;
      arr.push({ i, op, useBlend, dissolveOrder });
    }
    // Для idle-режима — отдельные параметры мерцания
    if (idle) {
      arr.forEach(c => {
        c.flickerDelay = rand() * 8000;
        c.flickerDuration = 1500 + rand() * 2500;
      });
    }
    return arr;
  }, [cols, computedRows, seed, baseOpacity, idle]);

  return (
    <div
      ref={containerRef}
      className={`glitch-mask ${className}`}
      style={style}
      aria-hidden="true"
    >
      {cells.map((c) => {
        // Ячейка считается "ушедшей" если её dissolveOrder < progress
        const isGone = c.dissolveOrder < progress;
        const cellOpacity = isGone ? 0 : c.op;
        const cellBlend = c.useBlend ? (blendMode === 'normal' ? 'difference' : blendMode) : 'normal';
        return (
          <div
            key={c.i}
            className="gm-cell"
            style={{
              opacity: cellOpacity,
              mixBlendMode: cellBlend,
            }}
          />
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  ScrambleSubtitle — text decrypt animation
// ═══════════════════════════════════════════════════════════════════════════
function ScrambleSubtitle({ text, started, onDone }) {
  const [chars, setChars] = useState(() => {
    const rand = rng(99);
    return text.split('').map(c =>
      (c === ' ' || c === '—' || c === '-') ? c
      : SCRAMBLE_GLYPHS.charAt(Math.floor(rand() * SCRAMBLE_GLYPHS.length))
    );
  });
  const startedRef = useRef(false);
  const onDoneRef = useRef(onDone);
  useEffect(() => { onDoneRef.current = onDone; }, [onDone]);

  useEffect(() => {
    if (!started || startedRef.current) return;
    startedRef.current = true;

    const target = text;
    const total = target.length;
    const lockTimes = [];
    const totalDuration = 1000;
    const startTs = performance.now();
    for (let i = 0; i < total; i++) {
      if (target[i] === ' ' || target[i] === '—' || target[i] === '-') {
        lockTimes.push(0);
      } else {
        lockTimes.push((i / total) * (totalDuration - 100) + Math.random() * 80);
      }
    }

    let raf;
    let cancelled = false;
    const tick = (now) => {
      if (cancelled) return;
      const elapsed = now - startTs;
      const next = target.split('').map((c, i) => {
        if (elapsed >= lockTimes[i]) return c;
        if (c === ' ' || c === '—' || c === '-') return c;
        return SCRAMBLE_GLYPHS.charAt(Math.floor(Math.random() * SCRAMBLE_GLYPHS.length));
      });
      setChars(next);
      if (elapsed < totalDuration) {
        raf = requestAnimationFrame(tick);
      } else {
        setChars(target.split(''));
        onDoneRef.current?.();
      }
    };
    raf = requestAnimationFrame(tick);
    return () => { cancelled = true; if (raf) cancelAnimationFrame(raf); };
  }, [started, text]);

  return (
    <div className={`intro-subtitle ${started ? 'shown' : ''}`}>
      {chars.map((c, i) => {
        if (c === ' ') return <span key={i} className="sub-sep">&nbsp;</span>;
        if (c === '—' || c === '-') return <span key={i} className="sub-sep">{c}</span>;
        return <span key={i} className="sub-char">{c}</span>;
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  IntroSequence — main orchestrator
// ═══════════════════════════════════════════════════════════════════════════
function IntroSequence({ onDone }) {
  const [phase, setPhase] = useState('reveal');   // reveal | settled | leaving
  const [progress, setProgress] = useState(0);    // 0..1 — для glitch-mask
  const [loadingPct, setLoadingPct] = useState(0);// 0..100 для текста
  const [crosshairDrawn, setCrosshairDrawn] = useState(false);
  const [subtitleStarted, setSubtitleStarted] = useState(false);
  const skipRef = useRef(false);
  const doneCalledRef = useRef(false);
  const reducedMotionRef = useRef(false);
  const timersRef = useRef([]);

  // Crosshair: длина обводки для DrawSVG-эффекта (расчёт после mount).
  // Окружность r=46 + 4 луча → ~289 + 4×30 = ~409 единиц.
  const CROSSHAIR_LEN = 600;

  const registerTimer = useCallback((cb, ms) => {
    const id = setTimeout(cb, ms);
    timersRef.current.push(id);
    return id;
  }, []);

  useEffect(() => {
    if (typeof window === 'undefined' || !window.matchMedia) return;
    reducedMotionRef.current = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }, []);

  useEffect(() => {
    return () => {
      timersRef.current.forEach(clearTimeout);
      timersRef.current = [];
    };
  }, []);

  // ── Animation: progress 0→1 за 1.7s, loading% синхронно ──────────────
  useEffect(() => {
    if (phase !== 'reveal') return;
    if (reducedMotionRef.current) {
      setProgress(1);
      setLoadingPct(100);
      setCrosshairDrawn(true);
      setSubtitleStarted(true);
      registerTimer(() => setPhase('leaving'), INTRO_REDUCED_MOTION_MS);
      return;
    }
    let raf;
    const start = performance.now();
    const duration = GLITCH_DISSOLVE_DURATION;
    const tick = (now) => {
      if (skipRef.current) return;
      const elapsed = now - start;
      const t = Math.min(1, elapsed / duration);
      setProgress(t);
      setLoadingPct(Math.round(t * 100));
      if (t < 1) {
        raf = requestAnimationFrame(tick);
      } else {
        setPhase('settled');
      }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [phase]);

  // ── Crosshair draw: стартует через ~300ms после mount ────────────────
  useEffect(() => {
    let cancelled = false;
    const start = () => {
      // Ждём fonts.ready чтобы избежать FOUT тайтла
      const go = () => {
        if (cancelled || skipRef.current) return;
        requestAnimationFrame(() => setCrosshairDrawn(true));
      };
      if (document.fonts && document.fonts.ready) {
        const t = setTimeout(go, 800);
        document.fonts.ready.then(() => { clearTimeout(t); go(); }).catch(() => { clearTimeout(t); go(); });
      } else {
        go();
      }
    };
    const timer = setTimeout(start, 300);
    return () => { cancelled = true; clearTimeout(timer); };
  }, []);

  // ── settled → пауза 250ms → запуск scramble ──────────────────────────
  useEffect(() => {
    if (phase !== 'settled') return;
    const t = registerTimer(() => setSubtitleStarted(true), INTRO_SETTLED_DELAY);
    return () => clearTimeout(t);
  }, [phase, registerTimer]);

  // ── Scramble done → hold 600ms → fade-out ────────────────────────────
  const handleSubtitleDone = useCallback(() => {
    registerTimer(() => {
      setPhase('leaving');
      registerTimer(() => {
        if (!doneCalledRef.current) {
          doneCalledRef.current = true;
          onDone?.();
        }
      }, INTRO_FADE_OUT_MS);
    }, INTRO_LEAVE_DELAY);
  }, [onDone, registerTimer]);

  const handleSkip = useCallback(() => {
    if (skipRef.current) return;
    skipRef.current = true;
    setProgress(1);
    setLoadingPct(100);
    setCrosshairDrawn(true);
    setSubtitleStarted(true);
    setPhase('leaving');
    registerTimer(() => {
      if (!doneCalledRef.current) {
        doneCalledRef.current = true;
        onDone?.();
      }
    }, INTRO_SKIP_FADE_MS);
  }, [onDone, registerTimer]);

  return (
    <div
      className={`intro-overlay ${phase === 'leaving' ? 'intro-leaving' : ''}`}
      onClick={handleSkip}
      role="dialog"
      aria-label="Loading"
    >
      {/* Layer 1: Sutera blueprint grid */}
      <svg
        className="intro-blueprint"
        viewBox="0 0 100 100"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        {/* Vertical lines: 25, 50, 75 */}
        <line x1="25" x2="25" y1="0" y2="100" />
        <line x1="50" x2="50" y1="0" y2="100" />
        <line x1="75" x2="75" y1="0" y2="100" />
        {/* Horizontal lines: 33.33, 66.66 */}
        <line x1="0" x2="100" y1="33.333" y2="33.333" />
        <line x1="0" x2="100" y1="66.666" y2="66.666" />
        {/* Intersection markers (9 squares) */}
        {[25, 50, 75].map(cx =>
          [33.333, 66.666].map(cy => (
            <rect key={`${cx}-${cy}`} x={cx - 0.5} y={cy - 0.5} width="1" height="1" />
          ))
        )}
      </svg>

      {/* Top chrome */}
      <div className="intro-chrome">
        <div className="lab-corner tl" />
        <div className="lab-corner tr" />
        <div className="lab-corner bl" />
        <div className="lab-corner br" />
      </div>

      <div className="intro-top">
        <div className="intro-tagline">
          <span className="intro-tag-label">[ INSTRUMENT INDEX ]</span>
        </div>
        <div className="intro-loading">
          <span className="intro-loading-label">Loading</span>
          <span className="intro-loading-num">{String(loadingPct).padStart(3, '0')}%</span>
        </div>
      </div>

      {/* Layer 2: Title + subtitle */}
      <div className="intro-stage">
        <h1 className="intro-title">{INTRO_TITLE}<span className="intro-title-stop">.</span></h1>
        <ScrambleSubtitle
          text={INTRO_SUBTITLE}
          started={subtitleStarted}
          onDone={handleSubtitleDone}
        />
      </div>

      {/* Layer 3: Crosshair (circle + four ticks, drawn with DrawSVG effect) */}
      <svg
        className={`intro-crosshair ${crosshairDrawn ? 'drawn lit' : ''}`}
        viewBox="0 0 100 100"
        aria-hidden="true"
        style={{ '--len': CROSSHAIR_LEN }}
      >
        {/* Outer circle */}
        <circle className="ch-stroke" cx="50" cy="50" r="46" />
        {/* Vertical ticks */}
        <line className="ch-stroke" x1="50" y1="4" x2="50" y2="20" />
        <line className="ch-stroke" x1="50" y1="80" x2="50" y2="96" />
        {/* Horizontal ticks */}
        <line className="ch-stroke" x1="4" y1="50" x2="20" y2="50" />
        <line className="ch-stroke" x1="80" y1="50" x2="96" y2="50" />
        {/* Center dot */}
        <circle className="ch-dot" cx="50" cy="50" r="1.5" />
      </svg>

      {/* Layer 4: Glitch mask — поверх всех слоёв в интро */}
      <GlitchMask
        cols={GLITCH_COLS}
        progress={progress}
        seed={42}
        baseOpacity={1}
      />

      {/* Bottom chrome */}
      <div className="intro-bottom">
        <div className="intro-bottom-left">SN-CS2926-V29A</div>
        <div className={`intro-bottom-right ${phase === 'leaving' ? 'hidden' : ''}`}>
          → TAP TO ENTER
        </div>
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const [screen, setScreen] = useState("start");
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState(Array(10).fill(5));
  const [tiebreakerAnswer, setTiebreakerAnswer] = useState(null);
  const [currentAnswer, setCurrentAnswer] = useState(5);
  const [debugOpen, setDebugOpen] = useState(false);
  const [wobbleTrigger, setWobbleTrigger] = useState(0);
  const [shareOpen, setShareOpen] = useState(false);
  const [soundMuted, setSoundMuted] = useState(false);

  // ── v2.9 Pulse trigger for FIELD ripple on each snap ────────────────
  const [fieldPulse, setFieldPulse] = useState(0);

  // ── v2.6 Paywall state ──────────────────────────────────────────────
  const [proStatus, setProStatus] = useState(false);
  const [usageCount, setUsageCount] = useState(0);
  const [totalDecisions, setTotalDecisions] = useState(0);
  const [paywallOpen, setPaywallOpen] = useState(false);

  // ── v2.4 Active category ───────────────────────────────────────────────
  // Какая категория активна. Меняется на старте кликом по кнопке категории.
  // Все ссылки на вопросы идут через activeQuestions, а не на конкретный массив,
  // чтобы добавление новой категории не требовало правок в App.
  const [activeCategoryId, setActiveCategoryId] = useState("large");
  const activeCategory = CATEGORIES[activeCategoryId];
  const activeQuestions = activeCategory.questions || [];

  // ── v2.3 Drama state (Дефект C) ────────────────────────────────────────
  // dramaTrigger — счётчик запусков (инкрементируется → useDramaTilt стартует заново)
  // dramaFinalTilt — финальный угол вердикта, передаётся в useDramaTilt
  //                  как точка приземления keyframes-серии. Вычисляется ЗАРАНЕЕ
  //                  в triggerVerdictFlow / handleTiebreaker, чтобы переход
  //                  drama → verdict шёл без скачка (дефект D).
  const [dramaTrigger, setDramaTrigger] = useState(0);
  const [dramaFinalTilt, setDramaFinalTilt] = useState(0);

  // ── Theme state ────────────────────────────────────────────────────────
  const [activeThemeId, setActiveThemeId] = useState('lab_reality');
  const [themeRev, setThemeRev] = useState(0);  // bump → re-render
  const [unlockedSet, setUnlockedSet] = useState(new Set());
  const [themeReady, setThemeReady] = useState(false);

  useEffect(() => {
    (async () => {
      await TE.restoreTheme('lab_reality');
      setActiveThemeId(TE.getCurrentThemeId() || 'lab_reality');
      const list = await TE.getUnlockedList();
      setUnlockedSet(new Set(list));
      // v2.6: load paywall state
      const pro = await UM.isPro();
      setProStatus(pro);
      const count = await UM.getUsageCount();
      setUsageCount(count);
      const total = await UM.getTotalDecisions();
      setTotalDecisions(total);
      setThemeReady(true);
    })();

    const unsub = TE.onThemeChange((theme) => {
      setActiveThemeId(theme.id);
      setThemeRev(r => r + 1);
    });
    return unsub;
  }, []);

  const handleThemeApply = useCallback(async (themeId) => {
    const ok = await TE.applyTheme(themeId);
    if (ok) {
      const list = await TE.getUnlockedList();
      setUnlockedSet(new Set(list));
    }
    return ok;
  }, []);

  const activeTheme = TE.getTheme(activeThemeId) || TE.getTheme('lab_reality');

  // ── v2.3: ScalesStage сам резолвит компонент темы из реестра.
  // Старые useMemo для QuestionScales/VerdictScalesComponent больше не нужны.

  const animPresets = activeTheme?.animation;

  const q = activeQuestions[qIndex];

  const { targetTilt, leftW, rightW } = useMemo(() => {
    let left = 0, right = 0;
    for (let i = 0; i < qIndex; i++) {
      const c = computeContribution(activeQuestions[i], answers[i]);
      if (c > 0) left += c; else right += Math.abs(c);
    }
    if (screen === "question") {
      const c = computeContribution(q, currentAnswer);
      if (c > 0) left += c; else right += Math.abs(c);
    }
    const total = left + right;
    if (total === 0) return { targetTilt: 0, leftW: 0, rightW: 0 };
    const ratio = (left - right) / total;
    return {
      targetTilt: -Math.max(-1, Math.min(1, ratio)) * 9,
      leftW: left, rightW: right
    };
  }, [answers, currentAnswer, qIndex, screen, q]);

  useEffect(() => {
    if (screen === "question") setCurrentAnswer(answers[qIndex] ?? 5);
  }, [qIndex, screen]);

  const handleSliderChange = useCallback((val) => setCurrentAnswer(val), []);
  const handleSliderTick = useCallback((val) => {
    hapticTick();
    SE.tick(activeThemeId, val);
    setFieldPulse(p => p + 1);  // v2.9: запускаем concentric ripple на FIELD
  }, [activeThemeId]);

  const handleNext = () => {
    hapticNext();
    SE.next(activeThemeId);
    const newAnswers = [...answers];
    newAnswers[qIndex] = currentAnswer;
    setAnswers(newAnswers);
    if (qIndex === activeQuestions.length - 1) triggerVerdictFlow(newAnswers);
    else setQIndex(qIndex + 1);
  };

  const triggerVerdictFlow = (finalAnswers) => {
    // v2.6: Increment usage counter when verdict is triggered
    (async () => {
      const data = await UM.incrementUsage();
      setUsageCount(data.count);
      const total = await UM.incrementTotalDecisions();
      setTotalDecisions(total);
    })();

    let left = 0, right = 0;
    finalAnswers.forEach((a, i) => {
      const c = computeContribution(activeQuestions[i], a);
      if (c > 0) left += c; else right += Math.abs(c);
    });
    const total = left + right;
    const diff = left - right;
    const diffPct = total > 0 ? Math.abs(diff) / total * 100 : 0;
    const willTie = diffPct < TIE_THRESHOLD && tiebreakerAnswer === null;

    // Финальный tilt вердикта вычисляем заранее, чтобы драматические
    // переколебания закончились ровно на нём — без скачка при переходе.
    // Для tie: drama приземляется в 0° (нейтрально), для решённого — ±14°.
    const isYes = diff > 0;
    const finalTilt = willTie ? 0 : (isYes ? -20 : 20);
    setDramaFinalTilt(finalTilt);
    setDramaTrigger(t => t + 1);
    setScreen("drama");

    // v2.7: Start drama hum sound
    SE.dramaStart(activeThemeId);

    // 2900ms = 2200ms активной драмы + 700ms приземления с overshoot
    // (см. DramaScales: setTilt(finalTilt) → +6% перелёт на 380ms → возврат на 580ms).
    // Verdict-screen появляется уже после того как тилт «осел» на finalTilt.
    setTimeout(() => {
      SE.dramaStop(activeThemeId);
      if (willTie) {
        setScreen("tiebreaker");
      } else {
        hapticVerdict();
        SE.verdict(activeThemeId, isYes);
        setWobbleTrigger(t => t + 1);
        setScreen("verdict");

        // v2.8: Save to Decision Journal
        const contributions = finalAnswers.map((a, i) => ({
          q: activeQuestions[i],
          contribution: computeContribution(activeQuestions[i], a)
        }));
        const sorted = [...contributions].sort((a, b) => Math.abs(b.contribution) - Math.abs(a.contribution));
        JM.addEntry({
          category: activeCategoryId,
          categoryName: activeCategory.name,
          verdict: isYes ? 'СТОИТ' : 'НЕ СТОИТ',
          diff, diffPct, left, right,
          top3: sorted.slice(0, 3)
        });
      }
    }, 2900);
  };

  const handleTiebreaker = (answer) => {
    hapticNext();
    setTiebreakerAnswer(answer);
    // После ответа на tie — пересчитываем финальный tilt с учётом tiebreaker-bonus
    let left = 0, right = 0;
    answers.forEach((a, i) => {
      const c = computeContribution(activeQuestions[i], a);
      if (c > 0) left += c; else right += Math.abs(c);
    });
    const adj = TIEBREAKER_MAP[answer];
    if (adj > 0) left += adj; else right += Math.abs(adj);
    const isYes = (left - right) > 0;
    const finalTilt = isYes ? -20 : 20;
    setDramaFinalTilt(finalTilt);
    setDramaTrigger(t => t + 1);
    setScreen("drama");

    // v2.7: drama hum for tiebreaker resolution
    SE.dramaStart(activeThemeId);

    setTimeout(() => {
      SE.dramaStop(activeThemeId);
      hapticVerdict();
      SE.verdict(activeThemeId, isYes);
      setWobbleTrigger(t => t + 1);
      setScreen("verdict");

      // v2.8: Save to Decision Journal (tiebreaker resolution)
      const diff = left - right;
      const total = left + right;
      const diffPct = total > 0 ? Math.abs(diff) / total * 100 : 0;
      const contributions = answers.map((a, i) => ({
        q: activeQuestions[i],
        contribution: computeContribution(activeQuestions[i], a)
      }));
      const sorted = [...contributions].sort((a, b) => Math.abs(b.contribution) - Math.abs(a.contribution));
      JM.addEntry({
        category: activeCategoryId,
        categoryName: activeCategory.name,
        verdict: isYes ? 'СТОИТ' : 'НЕ СТОИТ',
        diff, diffPct, left, right,
        top3: sorted.slice(0, 3)
      });
    }, 2900); // выровнено с triggerVerdictFlow
  };

  const computeVerdict = () => {
    let left = 0, right = 0;
    const contributions = answers.map((a, i) => {
      const c = computeContribution(activeQuestions[i], a);
      if (c > 0) left += c; else right += Math.abs(c);
      return { q: activeQuestions[i], contribution: c, answer: a };
    });
    if (tiebreakerAnswer !== null) {
      const adj = TIEBREAKER_MAP[tiebreakerAnswer];
      if (adj > 0) left += adj; else right += Math.abs(adj);
    }
    const total = left + right;
    const diff = left - right;
    const diffPct = total > 0 ? Math.abs(diff) / total * 100 : 0;
    return {
      verdict: diff > 0 ? "СТОИТ" : "НЕ СТОИТ",
      diff, diffPct, left, right, contributions, total
    };
  };

  const reset = () => {
    setScreen("start");
    setQIndex(0);
    setAnswers(Array(10).fill(5));
    setTiebreakerAnswer(null);
    setCurrentAnswer(5);
  };

  // Don't render until theme restored (prevent FOUC)
  if (!themeReady) return null;

  // ═════════════ LIMIT REACHED (v2.6) ═════════════
  if (screen === "limit-reached") {
    const handlePaywallUpgraded = async () => {
      setPaywallOpen(false);
      setProStatus(true);
      setScreen("start");
    };

    return (
      <div className="app">
        <div className="masthead">
          <span className="masthead-title">Холодные Весы</span>
          <span className="masthead-meta">Лимит · Free</span>
        </div>
        <div className="masthead-rule"></div>

        <LimitReachedScreen
          onUpgrade={() => setPaywallOpen(true)}
          onBack={() => setScreen("start")}
          totalDecisions={totalDecisions}
        />

        {paywallOpen && (
          <PaywallSheet
            onClose={() => setPaywallOpen(false)}
            onUpgraded={handlePaywallUpgraded}
            source="limit"
          />
        )}
      </div>
    );
  }

  // ═════════════ SKIN STORE ═════════════
  if (screen === "skin-store") {
    return (
      <SkinStore
        activeThemeId={activeThemeId}
        unlockedSet={unlockedSet}
        onThemeApply={handleThemeApply}
        onBack={() => setScreen("start")}
      />
    );
  }

  // ═════════════ DECISION JOURNAL (v2.8) ═════════════
  if (screen === "journal") {
    return (
      <JournalScreen
        onBack={() => setScreen("start")}
        totalDecisions={totalDecisions}
      />
    );
  }

  // ═════════════ START ═════════════
  if (screen === "start") {
    return (
      <div className="app">
        <div className="start-hero-wrap">
          <div className="start-hero-top">
            <span className="start-hero-tag">[ COLD SCALES /v29 ]</span>
            <span className="start-hero-version">
              {proStatus && <span className="pro-badge" style={{marginRight: 6}}>Pro</span>}
              <button className="skin-badge" onClick={() => setScreen("skin-store")} style={{marginLeft: 0}}>Skin</button>
            </span>
          </div>

          <h1 className="start-title">
            Холодные<br/>Весы<span className="dot">.</span>
          </h1>

          <div className="hero-field-wrap">
            <ScalesStage
              theme={activeTheme}
              phase="start"
              value={5}
              pulseTrigger={fieldPulse}
            />
          </div>

          <div className="hero-readout">
            <span>EQUILIBRIUM</span>
            <span className="hero-readout-eq">±0.00</span>
            <span>SN-CS2926</span>
          </div>

          <div className="start-tagline-card">
            <div className="start-tagline-bar">[ INSTRUMENT INDEX ]</div>
            <div className="start-tagline-body">
              Не&nbsp;уверен в&nbsp;покупке?<br/>
              Прибор взвесит за&nbsp;тебя — за&nbsp;60&nbsp;секунд, без эмоций.
            </div>
          </div>

          <UsageCounter usageCount={usageCount} isPro={proStatus} onProClick={() => setPaywallOpen(true)} />
        </div>

        <div className="category-list">
          {CATEGORY_ORDER.map((catId) => {
            const cat = CATEGORIES[catId];
            const handleClick = cat.available
              ? async () => {
                  // v2.7: init AudioContext on first user gesture
                  SE.init();
                  // v2.6: Check usage limits before starting
                  const allowed = await UM.canUse();
                  if (!allowed) {
                    setScreen("limit-reached");
                    return;
                  }
                  // При выборе категории сбрасываем прогресс и стартуем чистый прогон
                  setActiveCategoryId(catId);
                  setQIndex(0);
                  setAnswers(Array(cat.questions.length).fill(5));
                  setCurrentAnswer(5);
                  setTiebreakerAnswer(null);
                  setScreen("question");
                }
              : undefined;
            return (
              <button
                key={cat.id}
                className="category-item"
                onClick={handleClick}
                disabled={!cat.available}
                aria-label={`${cat.name}, ${cat.priceRange}`}
              >
                <div className="category-item-main">
                  <span className="category-item-num">{cat.num}</span>
                  <span className="category-item-title">{cat.name}</span>
                  <span className={`category-item-tag${cat.available ? '' : ' soon'}`}>
                    {cat.priceRange}
                  </span>
                </div>
                <span className="category-item-arrow">→</span>
              </button>
            );
          })}
        </div>

        {/* v2.8: Decision Journal entry point */}
        {proStatus ? (
          <button className="journal-entry-btn" onClick={() => setScreen("journal")}>
            <div className="journal-entry-btn-left">
              <span className="journal-entry-btn-icon">📊</span>
              <span className="journal-entry-btn-text">Decision Journal</span>
              {totalDecisions > 0 && (
                <span className="journal-entry-btn-count">{totalDecisions} решений</span>
              )}
            </div>
            <span className="journal-entry-btn-arrow">→</span>
          </button>
        ) : (
          <button className="journal-entry-btn locked" onClick={() => setPaywallOpen(true)}>
            <div className="journal-entry-btn-left">
              <span className="journal-entry-btn-icon">📊</span>
              <span className="journal-entry-btn-text">Decision Journal</span>
            </div>
            <span className="journal-pro-lock">Pro</span>
          </button>
        )}

        {paywallOpen && (
          <PaywallSheet
            onClose={() => setPaywallOpen(false)}
            onUpgraded={async () => {
              setPaywallOpen(false);
              setProStatus(true);
            }}
            source="start"
          />
        )}
      </div>
    );
  }

  // ═════════════ DRAMA ═════════════
  if (screen === "drama") {
    return (
      <div className="drama">
        <div className="drama-stage-slot">
          <DramaScales
            theme={activeTheme}
            dramaTrigger={dramaTrigger}
            dramaFinalTilt={dramaFinalTilt}
          />
        </div>
        <div className="drama-text">Взвешиваем...</div>
      </div>
    );
  }

  // ═════════════ TIEBREAKER ═════════════
  if (screen === "tiebreaker") {
    return (
      <div className="app">
        <div className="masthead">
          <span className="masthead-title">Холодные Весы</span>
          <span className="masthead-meta">Tie · interlude</span>
        </div>
        <div className="masthead-rule"></div>
        <div className="tiebreaker">
          <div className="tiebreaker-kicker">Весы сомневаются</div>
          <h2 className="tiebreaker-title">Вспомни последнюю крупную покупку. Что чувствуешь <em>сейчас</em>?</h2>
          <p className="tiebreaker-hint">Только честно — именно этот ответ склонит чашу.</p>
          <button className="tiebreaker-option" data-num="I" onClick={() => handleTiebreaker(1)}>
            Жалею, что купил. Лежит без дела.
          </button>
          <button className="tiebreaker-option" data-num="II" onClick={() => handleTiebreaker(2)}>
            Пользуюсь иногда, но без восторга.
          </button>
          <button className="tiebreaker-option" data-num="III" onClick={() => handleTiebreaker(3)}>
            Доволен. Стало частью жизни.
          </button>
          <button className="tiebreaker-option" data-num="IV" onClick={() => handleTiebreaker(4)}>
            Жалею, что не купил раньше.
          </button>
        </div>
      </div>
    );
  }

  // ═════════════ VERDICT ═════════════
  if (screen === "verdict") {
    const v = computeVerdict();
    const isYes = v.verdict === "СТОИТ";
    const finalTilt = isYes ? -20 : 20;
    const sorted = [...v.contributions].sort((a, b) => Math.abs(b.contribution) - Math.abs(a.contribution));
    const top3 = sorted.slice(0, 3);
    const verdictLong = v.verdict.length > 6;

    return (
      <div className="app">
        <div className="masthead">
          <span className="masthead-title">Холодные Весы</span>
          <span className="masthead-meta">Result · {activeQuestions.length} of {activeQuestions.length}</span>
        </div>
        <div className="masthead-rule"></div>

        <div className={`verdict-cover ${isYes ? 'yes' : 'no'}`}>
          <div className="verdict-cover-masthead">
            <span>№ {activeCategory.num} — {activeCategory.name}</span>
            <span>{new Date().toLocaleDateString('ru-RU', {day:'2-digit',month:'short',year:'numeric'})}</span>
          </div>
          <div className="verdict-cover-rule"></div>
          <div className="verdict-kicker">Вердикт весов</div>
          <div className={`verdict-display ${verdictLong ? 'long' : ''}`}>
            {v.verdict}
          </div>
          <div className="verdict-cover-scales">
            <ScalesStage
              theme={activeTheme}
              phase="verdict"
              tiltDeg={finalTilt}
              isYes={isYes}
              wobbleTrigger={wobbleTrigger}
            />
          </div>
          <div className="verdict-diff">
            <span>Разрыв · {v.diffPct.toFixed(0)}%</span>
            <span>Pro {v.left.toFixed(0)} / Contra {v.right.toFixed(0)}</span>
          </div>
        </div>

        <div className="explain">
          <h2 className="explain-heading">Что склонило чашу</h2>
          <div className="explain-kicker">Три сильнейших фактора</div>
          {top3.map((item, idx) => (
            <div key={idx} className="explain-item">
              <span className="explain-rank">{['I','II','III'][idx]}</span>
              <span className="explain-text">{item.q.text}</span>
              <span className={`explain-arrow ${item.contribution > 0 ? "pro" : "con"}`}>
                {item.contribution > 0 ? "PRO" : "CON"}
              </span>
            </div>
          ))}
        </div>

        <button className="btn-primary" onClick={reset}>Новое взвешивание</button>
        {!proStatus && usageCount >= UM.FREE_LIMIT && (
          <button className="btn-secondary" onClick={() => setPaywallOpen(true)} style={{marginTop:12, borderColor:'var(--hunter)', color:'var(--hunter)'}}>
            Pro · безлимитные взвешивания · {UM.PRO_PRICE_STARS} ★
          </button>
        )}
        <button className="share-btn" onClick={() => setShareOpen(true)}>
          ⚖ Поделиться вердиктом
        </button>
        <button className="btn-secondary" onClick={() => setDebugOpen(!debugOpen)}>
          {debugOpen ? "Скрыть" : "Показать"} математику
        </button>
        {debugOpen && (
          <div style={{marginTop: 16, padding: 16, background: 'var(--ink)', color: 'var(--paper)', fontFamily: 'IBM Plex Mono', fontSize: 10, lineHeight: 1.7}}>
            <div>PRO: {v.left.toFixed(2)}</div>
            <div>CONTRA: {v.right.toFixed(2)}</div>
            <div>DIFF: {v.diff.toFixed(2)} ({v.diffPct.toFixed(1)}%)</div>
            <div style={{marginTop: 8, paddingTop: 8, borderTop: '1px dashed #666'}}>
              {v.contributions.map((c, i) => (
                <div key={i}>Q{i+1} [{c.q.polarity}×{c.q.weight}] ans:{c.answer} → {c.contribution.toFixed(2)}</div>
              ))}
              {tiebreakerAnswer && <div>TB ans:{tiebreakerAnswer} → adj:{TIEBREAKER_MAP[tiebreakerAnswer]}</div>}
            </div>
            <div style={{marginTop: 8, paddingTop: 8, borderTop: '1px dashed #666'}}>
              Theme: {activeThemeId}<br/>
              Scales: {activeTheme?.scales?.question}
            </div>
          </div>
        )}

        {shareOpen && (
          <ShareSheet
            verdictData={{
              verdict: v.verdict,
              diff: v.diff,
              diffPct: v.diffPct,
              left: v.left,
              right: v.right,
              top3: top3,
              categoryName: activeCategory.name,
              categoryNum: activeCategory.num,
            }}
            themeId={activeThemeId}
            onClose={() => setShareOpen(false)}
          />
        )}

        {paywallOpen && (
          <PaywallSheet
            onClose={() => setPaywallOpen(false)}
            onUpgraded={async () => {
              setPaywallOpen(false);
              setProStatus(true);
            }}
            source="verdict"
          />
        )}
      </div>
    );
  }

  // ═════════════ QUESTION ═════════════
  const romanNumeral = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'][qIndex + 1];

  return (
    <div className="app">
      <div className="masthead">
        <span className="masthead-title">
          Холодные Весы
          {proStatus && <span className="pro-badge">Pro</span>}
        </span>
        <div className="masthead-right">
          <span className="masthead-meta">№ {activeCategory.num} · {activeCategory.name}</span>
          <button className="skin-badge" onClick={() => setScreen("skin-store")}>Skin</button>
          <button className="skin-badge" onClick={() => { const next = !soundMuted; setSoundMuted(next); SE.setMuted(next); }} aria-label="Toggle sound">
            {soundMuted ? '🔇' : '🔊'}
          </button>
        </div>
      </div>
      <div className="masthead-rule"></div>

      <div className="progress-ticker">
        {Array.from({length: activeQuestions.length}).map((_, i) => (
          <div key={i} className={`ticker-segment ${i < qIndex ? 'done' : ''} ${i === qIndex ? 'current' : ''}`} />
        ))}
      </div>

      <div className="question-splash">
        <div className="splash-number">{String(qIndex + 1).padStart(2, '0')}</div>
        <div className="splash-meta">
          <div className="splash-meta-label">Question · {romanNumeral}</div>
          <div className="splash-meta-total">of {activeQuestions.length}</div>
          <div className={`splash-meta-polarity ${q.polarity}`}>
            {q.polarity === 'gain' ? '↑ Pro side' : '↓ Contra side'} · w{q.weight}
          </div>
        </div>
      </div>

      <div className="scales-theatre">
        <ScalesStage
          theme={activeTheme}
          phase="question"
          value={currentAnswer}
          pulseTrigger={fieldPulse}
        />
      </div>

      <h2 className="question-text">{q.text}</h2>
      <div className="question-hint">{q.hint}</div>

      <div className="context-panel">
        <div className="context-text" key={Math.floor(currentAnswer/2)}>
          {getContextHint(q, currentAnswer)}
        </div>
      </div>

      <div className="instrument">
        <div className="instrument-labels">
          <div className="instrument-label">{q.labelLeft}</div>
          <div className="instrument-label right">{q.labelRight}</div>
        </div>
        <SnapSlider
          value={currentAnswer}
          onChange={handleSliderChange}
          onTick={handleSliderTick}
        />
      </div>

      <button className="btn-primary" onClick={handleNext}>
        {qIndex === activeQuestions.length - 1 ? "Взвесить" : "Дальше →"}
      </button>

      <button className="debug-btn" onClick={() => setDebugOpen(!debugOpen)}>
        {debugOpen ? "×" : "dbg"}
      </button>
      {debugOpen && (
        <div className="debug-panel">
          <div><strong>Q{qIndex+1}</strong> [{q.polarity}×{q.weight}]</div>
          <div>ans: {currentAnswer}</div>
          <div>contrib: {computeContribution(q, currentAnswer).toFixed(2)}</div>
          <div>target tilt: {targetTilt.toFixed(1)}°</div>
          <div>L/R target: {leftW.toFixed(1)} / {rightW.toFixed(1)}</div>
          <div style={{marginTop: 6, paddingTop: 6, borderTop: '1px dashed #555'}}>
            <strong>theme: {activeThemeId}</strong><br/>
            scales: {activeTheme?.scales?.question}<br/>
            breath: {animPresets?.questionScales?.breath?.amplitude}°/{animPresets?.questionScales?.breath?.period}ms<br/>
            stiff: tilt {animPresets?.questionScales?.smoothTilt?.stiffness}
          </div>
          <div style={{marginTop: 6, paddingTop: 6, borderTop: '1px dashed #555'}}>
            prev: [{answers.slice(0, qIndex).join(", ")}]
          </div>
          <div style={{marginTop: 6, paddingTop: 6, borderTop: '1px dashed #555'}}>
            <strong>v2.6 paywall</strong><br/>
            pro: {String(proStatus)}<br/>
            usage: {usageCount}/{UM.FREE_LIMIT}<br/>
            total: {totalDecisions}<br/>
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={async () => {
              if (proStatus) { await UM.deactivatePro(); setProStatus(false); }
              else { await UM.activatePro(); setProStatus(true); }
            }}>toggle pro</span>
            {' · '}
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={async () => {
              await TE.storage.set('usage_data', JSON.stringify({date: UM.todayKey(), count: 0}));
              setUsageCount(0);
            }}>reset usage</span>
          </div>
          <div style={{marginTop: 6, paddingTop: 6, borderTop: '1px dashed #555'}}>
            <strong>v2.7 sound</strong><br/>
            muted: {String(soundMuted)}<br/>
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={() => {
              const next = !soundMuted;
              setSoundMuted(next);
              SE.setMuted(next);
            }}>toggle mute</span>
            {' · '}
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={() => {
              SE.init();
              SE.tick(activeThemeId, 5);
            }}>test tick</span>
            {' · '}
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={() => {
              SE.init();
              SE.verdict(activeThemeId, true);
            }}>test verdict</span>
          </div>
          <div style={{marginTop: 6, paddingTop: 6, borderTop: '1px dashed #555'}}>
            <strong>v2.8 journal</strong><br/>
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={async () => {
              const entries = await JM.getEntries();
              alert('Journal: ' + entries.length + ' entries');
            }}>count entries</span>
            {' · '}
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={async () => {
              await JM.clearAll();
              alert('Journal cleared');
            }}>clear journal</span>
            {' · '}
            <span style={{cursor:'pointer', textDecoration:'underline'}} onClick={() => {
              setScreen("journal");
            }}>open journal</span>
          </div>
        </div>
      )}
    </div>
  );
}

function Root() {
  const [introVisible, setIntroVisible] = useState(() => {
    try {
      const seenAt = parseInt(localStorage.getItem(INTRO_STORAGE_KEY) || '0', 10);
      return !seenAt || (Date.now() - seenAt) > INTRO_TTL_MS;
    } catch { return true; }
  });

  const handleIntroDone = () => {
    try { localStorage.setItem(INTRO_STORAGE_KEY, String(Date.now())); } catch {}
    setIntroVisible(false);
  };

  return (
    <>
      <LabChrome />
      <App />
      {introVisible && <IntroSequence onDone={handleIntroDone} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
