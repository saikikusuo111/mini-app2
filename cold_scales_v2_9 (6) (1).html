<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Холодные Весы — v2.9 Lab Reality</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Lab Reality core tokens — стерильный лабораторный лист ──────── */
    --paper: #F4F2EC;
    --paper-deep: #EDEAE2;
    --paper-pressed: #E2DED2;
    --ink: #0A0A0A;
    --ink-soft: #1A1A1A;
    --ink-muted: #666660;
    --ink-whisper: #B0AFA8;
    --grid-line: rgba(10, 10, 10, 0.05);
    --grid-cross: rgba(10, 10, 10, 0.18);
    --oxblood: #C8412B;
    --oxblood-soft: #D55F4A;
    --hunter: #1F6E48;
    --hunter-soft: #2F8559;
    --warn: #B47A0B;

    --mono: 'IBM Plex Mono', ui-monospace, 'Courier New', monospace;
    --grotesk: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    --serif: var(--grotesk);

    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; }

  body {
    font-family: var(--mono);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    letter-spacing: 0;
    transition: background-color 350ms var(--ease-out), color 350ms var(--ease-out);
  }

  /* ═════════════════════════════════════════════════════════════════════
     LAB GRID BACKGROUND — стерильный лист с тонкой сеткой
     Глобальный фон, не зависит от темы. Сетка 24×24px, fixed.
     ═════════════════════════════════════════════════════════════════════ */
  .lab-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--grid-line) 0.5px, transparent 0.5px),
      linear-gradient(to bottom, var(--grid-line) 0.5px, transparent 0.5px);
    background-size: 24px 24px;
    background-position: 0 0;
  }
  .lab-grid::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, var(--grid-cross) 0.6px, transparent 0.7px);
    background-size: 96px 96px;
    background-position: 12px 12px;
    opacity: 0.7;
  }

  /* ═════════════════════════════════════════════════════════════════════
     LAB CHROME — угловые скобки + service codes по периметру экрана
     ═════════════════════════════════════════════════════════════════════ */
  .lab-chrome {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .lab-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 0.5px solid var(--ink);
  }
  .lab-corner.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
  .lab-corner.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
  .lab-corner.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
  .lab-corner.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }
  .lab-meta {
    position: absolute;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.4;
  }
  .lab-meta.tl { top: 16px; left: 32px; }
  .lab-meta.tr { top: 16px; right: 32px; }
  .lab-meta.bl { bottom: 16px; left: 32px; }
  .lab-meta.br { bottom: 16px; right: 32px; text-align: right; }
  .lab-meta-stack {
    position: absolute;
    bottom: 110px;
    right: 16px;
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.12em;
    line-height: 1.7;
    text-align: right;
    color: var(--ink);
    text-transform: uppercase;
    opacity: 0.7;
  }

  .app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 36px 24px 80px;
    position: relative;
    z-index: 2;
  }

  /* ═════════════════════════════════════════════════════════════════════
     MASTHEAD
     ═════════════════════════════════════════════════════════════════════ */
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 10px;
  }
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 10px;
    border-bottom: 0.5px solid var(--ink);
    margin-bottom: 8px;
  }
  .masthead-title {
    font-family: var(--mono);
    font-weight: 500;
    font-style: normal;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .masthead-meta {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .masthead-rule {
    display: none;
  }

  /* Skin switcher pill в masthead ─────────────────────────────────────── */
  .skin-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 3px 7px;
    border: 0.5px solid var(--ink-muted);
    cursor: pointer;
    background: transparent;
    transition: all 0.2s var(--ease-out);
    margin-left: 8px;
  }
  .skin-badge:hover {
    color: var(--ink);
    border-color: var(--ink);
  }
  .masthead-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ═════════════════════════════════════════════════════════════════════
     QUESTION SPLASH — лабораторный header вопроса
     ═════════════════════════════════════════════════════════════════════ */
  .question-splash {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 16px;
    align-items: start;
    margin-bottom: 24px;
    position: relative;
  }
  .splash-number {
    font-family: var(--mono);
    font-weight: 300;
    font-size: 96px;
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: var(--ink);
    margin-top: -4px;
    font-variant-numeric: tabular-nums;
  }
  .splash-meta {
    padding-top: 10px;
    border-top: 0.5px solid var(--ink);
    margin-top: 6px;
  }
  .splash-meta-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .splash-meta-total {
    font-family: var(--mono);
    font-style: normal;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--ink-muted);
  }
  .splash-meta-polarity {
    display: inline-block;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 0.5px solid var(--ink);
  }
  .splash-meta-polarity.gain { color: var(--hunter); border-color: var(--hunter); }
  .splash-meta-polarity.loss { color: var(--oxblood); border-color: var(--oxblood); }

  /* ═════════════════════════════════════════════════════════════════════
     PROGRESS TICKER — лабораторный прогресс [03/10]
     ═════════════════════════════════════════════════════════════════════ */
  .progress-ticker {
    display: flex;
    gap: 3px;
    margin-bottom: 24px;
  }
  .ticker-segment {
    flex: 1;
    height: 1px;
    background: var(--ink-whisper);
    transition: background 0.4s var(--ease-out), height 0.3s var(--ease-out);
  }
  .ticker-segment.done { background: var(--ink); }
  .ticker-segment.current {
    background: var(--ink);
    height: 2px;
    margin-top: -0.5px;
  }

  /* ═════════════════════════════════════════════════════════════════════
     SCALES THEATRE
     ═════════════════════════════════════════════════════════════════════ */
  .scales-theatre {
    height: 170px;
    position: relative;
    margin-bottom: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 14px 0;
  }
  .scales-svg {
    width: 100%;
    max-width: 400px;
    height: 160px;
    overflow: visible;
  }

  /* ═════════════════════════════════════════════════════════════════════
     SCALES STAGE — v2.9 контейнер для FIELD-матрицы
     Phase-aware: разная высота, разная плотность точек по фазам.
     ═════════════════════════════════════════════════════════════════════ */
  .scales-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin: 0 auto;
    transition:
      filter 500ms var(--ease-out),
      opacity 400ms var(--ease-out);
  }
  .scales-stage[data-phase="question"],
  .scales-stage[data-phase="start"] {
    max-width: 320px;
    height: 280px;
    padding: 0;
  }
  .scales-stage[data-phase="drama"],
  .scales-stage[data-phase="verdict"] {
    max-width: 320px;
    height: 240px;
    padding: 0;
  }
  .scales-stage[data-phase="drama"] {
    filter: saturate(0.92);
  }

  /* ═════════════════════════════════════════════════════════════════════
     FIELD STAGE — точечная матрица 11×11 круг
     Активные точки: filled чёрный 6px. Idle: outline 4px полупрозрачные.
     На verdict-обложке: paper-цвет (инверсия).
     ═════════════════════════════════════════════════════════════════════ */
  .field-stage {
    position: relative;
    width: 100%;
    height: 100%;
    aspect-ratio: 1;
    max-width: 280px;
    max-height: 280px;
    margin: 0 auto;
  }
  .field-axis-h, .field-axis-v {
    position: absolute;
    background: var(--ink);
    opacity: 0.10;
    pointer-events: none;
  }
  .field-axis-h {
    left: 8%;
    right: 8%;
    height: 0.5px;
    top: 50%;
  }
  .field-axis-v {
    top: 8%;
    bottom: 8%;
    width: 0.5px;
    left: 50%;
  }
  .field-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--ink);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition:
      transform 0.45s var(--spring),
      opacity 0.4s ease,
      width 0.3s ease,
      height 0.3s ease,
      background 0.3s ease,
      border 0.3s ease;
    will-change: transform, opacity;
    pointer-events: none;
  }
  .field-dot.idle {
    background: transparent;
    border: 0.5px solid var(--ink);
    opacity: 0.45;
    width: 4px;
    height: 4px;
  }
  .field-dot.active {
    background: var(--ink);
    opacity: 1;
  }
  /* На verdict-обложке инвертируем: точки становятся paper-цветом */
  .verdict-cover .field-dot.active,
  .field-stage[data-phase="verdict"] .field-dot.active {
    background: var(--paper);
  }
  .verdict-cover .field-dot.idle,
  .field-stage[data-phase="verdict"] .field-dot.idle {
    background: transparent;
    border-color: var(--paper);
    opacity: 0.5;
  }
  .verdict-cover .field-axis-h,
  .verdict-cover .field-axis-v,
  .field-stage[data-phase="verdict"] .field-axis-h,
  .field-stage[data-phase="verdict"] .field-axis-v {
    background: var(--paper);
    opacity: 0.18;
  }

  /* Pulse keyframe — рейв-ритм */
  @keyframes field-pulse-kf {
    0%   { transform: translate(-50%, -50%) scale(1);   }
    40%  { transform: translate(-50%, -50%) scale(1.7); }
    100% { transform: translate(-50%, -50%) scale(1);   }
  }
  .field-dot.field-dot-pulse {
    animation: field-pulse-kf 0.38s ease-in-out;
  }

  /* ═════════════════════════════════════════════════════════════════════
     QUESTION TEXT — Space Grotesk для читаемости больших блоков
     ═════════════════════════════════════════════════════════════════════ */
  .question-text {
    font-family: var(--grotesk);
    font-weight: 500;
    font-size: 26px;
    line-height: 1.12;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .question-hint {
    font-family: var(--mono);
    font-style: normal;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink-muted);
    padding-left: 10px;
    border-left: 0.5px solid var(--ink);
    margin-bottom: 24px;
    letter-spacing: 0.01em;
  }

  /* ═════════════════════════════════════════════════════════════════════
     CONTEXT PANEL — лабораторная карточка с угловой выемкой (LabCard)
     Угол срезан 14×14, fallback через clip-path с feature-detection
     ═════════════════════════════════════════════════════════════════════ */
  .context-panel {
    background: #FFFFFF;
    border: 0.5px solid var(--ink);
    padding: 14px 16px;
    margin-bottom: 28px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  }
  .context-panel::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 14px;
    height: 14px;
    background: linear-gradient(to bottom left, var(--paper) 49.5%, var(--ink) 49.5%, var(--ink) 50.5%, transparent 50.5%);
    pointer-events: none;
  }
  .context-text {
    font-family: var(--mono);
    font-style: normal;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    transition: opacity 0.2s ease;
  }

  /* ═════════════════════════════════════════════════════════════════════
     INSTRUMENT / DIAL — лабораторный слайдер
     ═════════════════════════════════════════════════════════════════════ */
  .instrument { margin-bottom: 32px; }
  .instrument-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
  }
  .instrument-label {
    max-width: 44%;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    line-height: 1.3;
    color: var(--ink);
  }
  .instrument-label.right { text-align: right; }

  /* ════════════════════════════════════════════════════════════════════════
     SNAP SLIDER — v2.3.3 alignment fix
     Якорная модель из самого первого прототипа: 5 фиксированных значений
     0/3/5/7/10 с лейблами «Нет/Не уверен/Серединка/Скорее да/Твёрдо да».
     v2.3.3 fix: thumb и anchor-dots ДЕЛЯТ систему координат
     (left: percentage + translateX(-50%)). Это убирает смещение thumb
     относительно точки, которое было в v2.3.2 на крайних якорях.
     Магия ощущения «прилипает»:
       1. Magnetic snap: thumb прыгает на ближайший якорь при drag.
       2. Spring-cubic transition с overshoot — cubic-bezier(0.34, 1.56, 0.64, 1)
       3. Scale-pulse 1.18→1 на каждом snap + viborate(8).
     ════════════════════════════════════════════════════════════════════════ */
  .snap-track {
    position: relative;
    height: 64px;
    /* Внутренний отступ ровно равен радиусу thumb (24px) — чтобы при
       value=0 центр thumb-а был у левой кромки visual-зоны точек,
       а при value=10 — у правой. */
    padding: 0 24px;
    background: #FFFFFF;
    border: 0.5px solid var(--ink);
    border-radius: 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    box-sizing: border-box;
  }
  /* Внутренняя «track-зона» — линия между крайними якорями.
     Все элементы (dots, thumb, fill) позиционируются ВНУТРИ неё,
     через left: percentage. */
  .snap-rail {
    position: absolute;
    top: 0; bottom: 0;
    left: 24px; right: 24px;
  }
  .snap-rail::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 0.5px;
    background: var(--ink);
    opacity: 0.4;
    pointer-events: none;
  }
  .snap-fill {
    position: absolute;
    left: 0; top: 50%;
    height: 1px;
    transform: translateY(-50%);
    width: 0%;
    background: var(--ink);
    opacity: 0.6;
    transition: width 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 1;
  }
  .anchor-dot {
    position: absolute;
    top: 50%;
    width: 0.5px; height: 12px;
    margin-left: 0; margin-top: -6px;
    background: var(--ink);
    border-radius: 0;
    transition: opacity 0.22s var(--ease-out), background 0.22s var(--ease-out);
    pointer-events: auto;
    cursor: pointer;
    transform: translateX(-50%);
  }
  .anchor-dot::after {
    content: attr(data-val);
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
  }
  .anchor-dot.active {
    background: var(--ink);
    transform: translateX(-50%) scaleY(1.5);
  }
  .snap-thumb {
    position: absolute;
    top: 50%;
    width: 32px; height: 32px;
    /* Центр thumb-а позиционируется через left + translate(-50%, -50%). */
    transform: translate(-50%, -50%);
    transform-origin: center center;
    background: var(--ink);
    border: 2px solid var(--paper);
    outline: 0.5px solid var(--ink);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--paper);
    font-family: var(--mono);
    font-style: normal;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0;
    pointer-events: none;
    z-index: 3;
    transition:
      left 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
      transform 0.16s ease;
    will-change: left, transform;
  }
  /* scale-pulse при snap к якорю: amplify на 1.18 + лёгкий «отскок» */
  .snap-thumb.pulse {
    transform: translate(-50%, -50%) scale(1.22);
  }
  .snap-labels {
    position: relative;
    margin-top: 18px;
    /* Так же 24px-padding для синхронизации с rail */
    padding: 0 24px;
    height: 28px;
  }
  .snap-label {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    text-align: center;
    transition: color 0.2s var(--ease-out), font-weight 0.2s var(--ease-out);
    line-height: 1.2;
    cursor: pointer;
    white-space: nowrap;
  }
  .snap-label.active {
    color: var(--ink);
    font-weight: 600;
  }
  @media (prefers-reduced-motion: reduce) {
    .snap-thumb {
      transition: left 0.18s ease, transform 0.1s ease;
    }
    .snap-fill {
      transition: width 0.18s ease;
    }
  }

  /* ═════════════════════════════════════════════════════════════════════
     BUTTONS — лабораторные кнопки, прямоугольные, моно
     ═════════════════════════════════════════════════════════════════════ */
  .btn-primary {
    width: 100%;
    padding: 18px 20px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.2s var(--spring), background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: "→ ";
    margin-right: 4px;
  }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    padding: 12px 14px;
    background: transparent;
    color: var(--ink);
    border: 0.5px solid var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: var(--paper-deep); }

  /* ═════════════════════════════════════════════════════════════════════
  /* ═════════════════════════════════════════════════════════════════════
     DRAMA / VERDICT — лабораторный протокол
     ═════════════════════════════════════════════════════════════════════ */
  .drama {
    position: fixed;
    inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.4s var(--ease-out);
    padding: 0 20px;

  /* ═════════════════════════════════════════════════════════════════════
     SKIN STORE — витрина выбора темы

  .skin-card {

  .skin-card.active {

  .skin-card.active .skin-card-price { color: var(--paper); opacity: 0.7; }

  .skin-card-badge {

    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 2px 5px;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .skin-card.active .skin-card-badge {
    background: var(--hunter);
    color: var(--paper);
    border-color: var(--hunter);
  }

  .skin-preview {
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;

    height: 100%;

    font-size: 20px;

  }
  .skin-card-price {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    padding-top: 8px;
    border-top: 1px solid currentColor;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Locked state ───────────────────────────────────────────────────── */
  .skin-card.locked { cursor: pointer; }
  .skin-card.locked .skin-preview {
    filter: blur(3px) grayscale(0.5);
    opacity: 0.5;
  }
  .skin-card.locked .skin-card-title { opacity: 0.6; }
  .skin-card.locked .skin-card-desc { opacity: 0.4; }
  .skin-lock-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .skin-lock-icon {
    width: 34px; height: 34px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  /* Coming soon ────────────────────────────────────────────────────── */
  .skin-card.stub {
    opacity: 0.55;
    cursor: default;
  }
  .skin-card.stub:hover { transform: none; box-shadow: none; }
  .skin-card.stub .skin-preview { opacity: 0.3; }

    align-items: center;

    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 2px 6px;
    background: var(--hunter);
    color: var(--paper);
    margin-left: 6px;

  }
  @keyframes proBadgeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  /* Usage counter pill на start screen */
  .usage-counter {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;

    padding: 6px 10px;

  .usage-counter .usage-dots {

    gap: 4px;
  }
  .usage-counter .usage-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1px solid var(--ink-muted);
    transition: all 0.3s var(--ease-out);
  }
  .usage-counter .usage-dot.spent {
    background: var(--ink-muted);

  .usage-counter .usage-dot.current {
    background: var(--hunter);
    border-color: var(--hunter);
    animation: dotPulse 1s ease infinite;
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }

  .usage-counter.exhausted {
    border-color: var(--oxblood);
    color: var(--oxblood);

  .usage-counter.exhausted .usage-dot.spent {

    border-color: var(--oxblood);

  /* ═════════════════════════════════════════════════════════════════════
     INTRO SEQUENCE — Sutera blueprint + glitch-mask reveal + crosshair draw
     ═════════════════════════════════════════════════════════════════════ */
  .intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px 22px;
    cursor: pointer;
    overflow: hidden;
    isolation: isolate;
  }
  .intro-overlay.intro-leaving {
    animation: intro-fade-out 0.55s var(--ease-out) forwards;
  }
  @keyframes intro-fade-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* ── Layer 1: Sutera blueprint grid (vert 25/50/75, horiz 33/66) ──── */
  .intro-blueprint {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    color: var(--ink-whisper);
  }
  .intro-blueprint line {
    stroke: currentColor;
    stroke-width: 0.5;
    vector-effect: non-scaling-stroke;
    opacity: 0;
    animation: intro-blueprint-fade-in 0.6s var(--ease-out) 0.1s forwards;
  }
  .intro-blueprint rect {
    fill: var(--ink);
    opacity: 0;
    animation: intro-blueprint-rect-in 0.5s var(--ease-out) 0.4s forwards;
  }
  @keyframes intro-blueprint-fade-in {
    from { opacity: 0; }
    to   { opacity: 0.55; }
  }
  @keyframes intro-blueprint-rect-in {
    from { opacity: 0; transform: scale(0); }
    to   { opacity: 0.7; transform: scale(1); }
  }

  /* ── Layer 2: Title + subtitle (sit underneath the glitch-mask) ──── */
  .intro-stage {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
    pointer-events: none;
  }
  .intro-title {
    font-family: var(--grotesk);
    font-weight: 600;
    font-size: clamp(48px, 13vw, 88px);
    line-height: 0.92;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    margin: 0;
    white-space: pre-line;
    /* Тайтл уже отрендерен финально — глитч-маска поверх его постепенно сходит */
  }
  .intro-title .intro-title-stop {
    color: var(--ink);
    /* Финальная точка как у Sutera — sparks-аналог */
  }
  .intro-subtitle {
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    min-height: 1.3em;
    opacity: 0;
    transition: opacity 0.4s var(--ease-out);
    white-space: nowrap;
  }
  .intro-subtitle.shown { opacity: 1; }
  .intro-subtitle .sub-char { display: inline-block; font-variant-numeric: tabular-nums; width: 1ch; text-align: center; }
  .intro-subtitle .sub-sep { display: inline-block; width: 1.5ch; text-align: center; }

  /* ── Layer 3: Crosshair (DrawSVG-style stroke reveal) ─────────────── */
  .intro-crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(120px, 32vw, 200px);
    height: clamp(120px, 32vw, 200px);
    pointer-events: none;
    z-index: 3;
    color: var(--ink);
    opacity: 0;
    transition: opacity 0.4s var(--ease-out);
  }
  .intro-crosshair.lit { opacity: 0.85; }
  .intro-crosshair .ch-stroke {
    fill: none;
    stroke: currentColor;
    stroke-width: 0.5;
    vector-effect: non-scaling-stroke;
    stroke-linecap: round;
    /* DrawSVG-эффект через stroke-dasharray + stroke-dashoffset */
    stroke-dasharray: var(--len, 1000);
    stroke-dashoffset: var(--len, 1000);
    transition: stroke-dashoffset 1.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .intro-crosshair.drawn .ch-stroke {
    stroke-dashoffset: 0;
  }
  .intro-crosshair .ch-dot {
    fill: currentColor;
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    transform: scale(0);
    transition: opacity 0.3s var(--ease-out) 1.2s, transform 0.4s var(--spring) 1.2s;
  }
  .intro-crosshair.drawn .ch-dot {
    opacity: 1;
    transform: scale(1);
  }

  /* ── Layer 4: Glitch-mask (~169 squares, dissolve random stagger) ── */
  /* Reusable component — also exported for in-app glitch effects */
  .glitch-mask {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-wrap: wrap;
    pointer-events: none;
    overflow: hidden;
  }
  .glitch-mask .gm-cell {
    width: 7.6923%;       /* 100/13 — 13 столбцов точно как у Sutera */
    aspect-ratio: 1 / 1;
    background: var(--paper);
    transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity;
  }
  /* В intro-режиме маска сидит поверх тайтла */
  .intro-overlay .glitch-mask { z-index: 4; }

  /* ── Top/bottom chrome (loading, codes) ──────────────────────────── */
  .intro-chrome {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .intro-chrome .lab-corner.tl { top: 12px; left: 12px; }
  .intro-chrome .lab-corner.tr { top: 12px; right: 12px; }
  .intro-chrome .lab-corner.bl { bottom: 12px; left: 12px; }
  .intro-chrome .lab-corner.br { bottom: 12px; right: 12px; }

  .intro-top, .intro-bottom {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    position: relative;
    z-index: 5;
  }
  .intro-tag-label,
  .intro-loading-label,
  .intro-loading-num,

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<!-- ═══════════════════════════════════════════════════════════════════════
     THEME ENGINE (встроен инлайн для автономности HTML-прототипа;
     в production — вынести в theme-engine.js как внешний модуль)
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';
  const STORAGE_PREFIX = 'coldscales:';

  // ── Storage adapter (TG CloudStorage → localStorage fallback) ──────────
  const storage = {
    _tg() {
      return typeof window !== 'undefined'
        && window.Telegram?.WebApp?.CloudStorage
        ? window.Telegram.WebApp.CloudStorage
        : null;
    },
    get(key) {
      const k = STORAGE_PREFIX + key;
      const tg = this._tg();
      return new Promise((resolve) => {
        if (tg) tg.getItem(k, (err, val) => resolve(err ? null : val));
        else { try { resolve(localStorage.getItem(k)); } catch { resolve(null); } }
      });
    },
    set(key, value) {
      const k = STORAGE_PREFIX + key;
      const tg = this._tg();
      return new Promise((resolve) => {
        if (tg) tg.setItem(k, String(value), (err) => resolve(!err));
        else { try { localStorage.setItem(k, String(value)); resolve(true); } catch { resolve(false); } }
      });
    },
    remove(key) {
      const k = STORAGE_PREFIX + key;
      const tg = this._tg();
      return new Promise((resolve) => {
        if (tg) tg.removeItem(k, (err) => resolve(!err));
        else { try { localStorage.removeItem(k); resolve(true); } catch { resolve(false); } }
      });
    }
  };

  // ── Font loader (lazy, cached) ─────────────────────────────────────────
  const loadedFonts = new Set();
  function loadFont(fontConfig) {
    if (!fontConfig?.url) return Promise.resolve();
    if (loadedFonts.has(fontConfig.url)) return Promise.resolve();
    return new Promise((resolve) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = fontConfig.url;
      link.onload = () => { loadedFonts.add(fontConfig.url); resolve(); };
      link.onerror = () => { console.warn('[theme] Font load failed:', fontConfig.url); resolve(); };
      document.head.appendChild(link);
    });
  }

  // ── Registries ─────────────────────────────────────────────────────────
  const THEMES = new Map();
  const SCALES_COMPONENTS = new Map();

  function registerTheme(theme) {
    if (!theme?.id) throw new Error('[theme] Theme must have id');
    THEMES.set(theme.id, theme);
  }
  function registerScalesComponent(name, component) {
    SCALES_COMPONENTS.set(name, component);
  }

  // ── Unlock logic ───────────────────────────────────────────────────────
  async function getUnlockedList() {
    const raw = await storage.get('unlocked_themes');
    try { return raw ? JSON.parse(raw) : []; } catch { return []; }
  }
  async function isUnlocked(themeId) {
    const theme = THEMES.get(themeId);
    if (!theme) return false;
    if (theme.meta.price === 0) return true;
    const list = await getUnlockedList();
    return list.includes(themeId);
  }
  async function simulateUnlock(themeId) {
    const list = await getUnlockedList();
    if (!list.includes(themeId)) {
      list.push(themeId);
      await storage.set('unlocked_themes', JSON.stringify(list));
    }
    return true;
  }
  async function lockTheme(themeId) {
    const list = await getUnlockedList();
    const filtered = list.filter(id => id !== themeId);
    await storage.set('unlocked_themes', JSON.stringify(filtered));
    return true;
  }
  async function unlockTheme(themeId) {
    // TODO production: fetch invoice → Telegram.WebApp.openInvoice()
    // В demo — делегируем simulateUnlock
    return simulateUnlock(themeId);
  }

  // ── Apply theme ────────────────────────────────────────────────────────
  let currentThemeId = null;
  const listeners = new Set();

  function onThemeChange(cb) { listeners.add(cb); return () => listeners.delete(cb); }

  async function applyTheme(themeId) {
    const theme = THEMES.get(themeId);
    if (!theme) { console.warn(`[theme] Unknown: ${themeId}`); return false; }
    if (theme.meta?.status === 'stub') { console.warn(`[theme] Stub not applicable: ${themeId}`); return false; }
    const unlocked = await isUnlocked(themeId);
    if (!unlocked) { console.warn(`[theme] Locked: ${themeId}`); return false; }

    // 1. CSS vars
    const root = document.documentElement;
    Object.entries(theme.tokens || {}).forEach(([k, v]) => root.style.setProperty(k, v));

    // 2. body data-theme attribute (для CSS-специфичных override)
    if (document.body) document.body.dataset.theme = themeId;

    // 3. Fonts (lazy, не блокируем)
    loadFont(theme.fonts?.display);
    loadFont(theme.fonts?.mono);

    // 4. Persist
    currentThemeId = themeId;
    await storage.set('current_theme', themeId);

    // 5. Notify (для React re-render)
    listeners.forEach(cb => { try { cb(theme); } catch (e) { console.warn(e); } });

    return true;
  }

  async function restoreTheme(defaultId = 'lab_reality') {
    const saved = await storage.get('current_theme');
    const target = saved && THEMES.has(saved) ? saved : defaultId;
    await applyTheme(target);
    return target;
  }

  // ── Public API ─────────────────────────────────────────────────────────
  window.ThemeEngine = {
    registerTheme,
    registerScalesComponent,
    getTheme: (id) => THEMES.get(id) || null,
    getScalesComponent: (name) => SCALES_COMPONENTS.get(name) || null,
    listThemes: () => Array.from(THEMES.values()),
    applyTheme,
    restoreTheme,
    getCurrentThemeId: () => currentThemeId,
    onThemeChange,
    isUnlocked,
    unlockTheme,
    simulateUnlock,
    lockTheme,
    getUnlockedList,
    storage
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     USAGE MANAGER v2.6 — Paywall logic, usage tracking, Pro state
     Uses ThemeEngine.storage adapter (TG CloudStorage → localStorage fallback)
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';
  const storage = window.ThemeEngine.storage;
  const FREE_LIMIT = 3;
  const PRO_PRICE_STARS = 149;

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function msUntilMidnight() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    return midnight - now;
  }

  function formatTimeLeft(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h > 0) return `${h} ч ${m} мин`;
    return `${m} мин`;
  }

  async function getUsageData() {
    const raw = await storage.get('usage_data');
    try {
      const data = raw ? JSON.parse(raw) : null;
      if (data && data.date === todayKey()) return data;
      return { date: todayKey(), count: 0 };
    } catch {
      return { date: todayKey(), count: 0 };
    }
  }

  async function incrementUsage() {
    const data = await getUsageData();
    data.count += 1;
    data.date = todayKey();
    await storage.set('usage_data', JSON.stringify(data));
    return data;
  }

  async function getUsageCount() {
    const data = await getUsageData();
    return data.count;
  }

  async function canUse() {
    if (await isPro()) return true;
    const data = await getUsageData();
    return data.count < FREE_LIMIT;
  }

  async function getRemainingUses() {
    if (await isPro()) return Infinity;
    const data = await getUsageData();
    return Math.max(0, FREE_LIMIT - data.count);
  }

  async function isPro() {
    const raw = await storage.get('pro_status');
    try {
      const data = raw ? JSON.parse(raw) : null;
      if (!data || !data.active) return false;
      if (data.expiresAt && new Date(data.expiresAt) < new Date()) {
        await storage.set('pro_status', JSON.stringify({ active: false }));
        return false;
      }
      return true;
    } catch {
      return false;
    }
  }

  async function activatePro() {
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + 30);
    await storage.set('pro_status', JSON.stringify({
      active: true,
      activatedAt: new Date().toISOString(),
      expiresAt: expiresAt.toISOString()
    }));
    return true;
  }

  async function deactivatePro() {
    await storage.set('pro_status', JSON.stringify({ active: false }));
    return true;
  }

  async function getTotalDecisions() {
    const raw = await storage.get('total_decisions');
    return raw ? parseInt(raw, 10) || 0 : 0;
  }

  async function incrementTotalDecisions() {
    const total = await getTotalDecisions();
    await storage.set('total_decisions', String(total + 1));
    return total + 1;
  }

  window.UsageManager = {
    FREE_LIMIT,
    PRO_PRICE_STARS,
    getUsageData,
    incrementUsage,
    getUsageCount,
    canUse,
    getRemainingUses,
    isPro,
    activatePro,
    deactivatePro,
    getTotalDecisions,
    incrementTotalDecisions,
    msUntilMidnight,
    formatTimeLeft,
    todayKey
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     JOURNAL MANAGER v2.8 — Decision Journal storage + analytics
     Pro-only feature. Uses ThemeEngine.storage adapter.
     Stores entries as JSON array under 'journal_entries' key.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';
  const storage = window.ThemeEngine.storage;
  const STORAGE_KEY = 'journal_entries';
  const MAX_ENTRIES = 200; // cap to prevent storage overflow

  async function getEntries() {
    const raw = await storage.get(STORAGE_KEY);
    try {
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  async function addEntry(entry) {
    const entries = await getEntries();
    // Entry shape: { id, category, categoryName, verdict, diff, diffPct, left, right, top3, timestamp }
    const record = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      category: entry.category,
      categoryName: entry.categoryName,
      verdict: entry.verdict,
      diff: entry.diff,
      diffPct: entry.diffPct,
      left: entry.left,
      right: entry.right,
      top3: (entry.top3 || []).map(f => ({
        text: f.q?.text || f.text || '',
        contribution: f.contribution,
        polarity: f.q?.polarity || f.polarity || 'gain'
      })),
      timestamp: new Date().toISOString()
    };
    entries.unshift(record); // newest first
    // Cap entries
    if (entries.length > MAX_ENTRIES) entries.length = MAX_ENTRIES;
    await storage.set(STORAGE_KEY, JSON.stringify(entries));
    return record;
  }

  async function clearAll() {
    await storage.set(STORAGE_KEY, JSON.stringify([]));
  }

  function computeAnalytics(entries) {
    if (!entries.length) return { total: 0, yesCount: 0, noCount: 0, yesPct: 0, noPct: 0, topCategory: null, topCategoryCount: 0 };

    let yesCount = 0;
    let noCount = 0;
    const catMap = {};

    entries.forEach(e => {
      if (e.verdict === 'СТОИТ') yesCount++;
      else noCount++;
      const cat = e.categoryName || e.category || 'Покупка';
      catMap[cat] = (catMap[cat] || 0) + 1;
    });

    const total = entries.length;
    const yesPct = total > 0 ? Math.round(yesCount / total * 100) : 0;
    const noPct = total > 0 ? Math.round(noCount / total * 100) : 0;

    // Find most frequent category
    let topCategory = null;
    let topCategoryCount = 0;
    Object.entries(catMap).forEach(([cat, count]) => {
      if (count > topCategoryCount) {
        topCategory = cat;
        topCategoryCount = count;
      }
    });

    return { total, yesCount, noCount, yesPct, noPct, topCategory, topCategoryCount };
  }

  window.JournalManager = {
    getEntries,
    addEntry,
    clearAll,
    computeAnalytics,
    MAX_ENTRIES
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     SOUND ENGINE v2.7 — Web Audio API synthesized sound layer
     Theme-aware: each skin defines its own sound character.
     All sounds are oscillator-based (zero external samples).
     Lazy AudioContext init on first user gesture (browser policy).
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  let ctx = null;       // AudioContext — lazy init
  let masterGain = null;
  let muteState = false;
  let dramaOsc = null;  // active drama hum oscillator ref
  let dramaGain = null; // drama gain node ref

  // ── Lazy init (must be called inside user gesture) ─────────────────────
  function ensureContext() {
    if (ctx && ctx.state !== 'closed') {
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      return true;
    }
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = muteState ? 0 : 0.6;
      masterGain.connect(ctx.destination);
      return true;
    } catch (e) {
      console.warn('[sound] Web Audio not available:', e);
      return false;
    }
  }

  // ── Helpers ─────────────────────────────────────────────────────────────

  // Quick envelope: attack → hold → decay
  function playTone({ freq = 440, type = 'sine', attack = 0.005, hold = 0.02,
                      decay = 0.08, volume = 0.3, detune = 0, filterFreq = 0 } = {}) {
    if (!ensureContext() || muteState) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const env = ctx.createGain();

    osc.type = type;
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;

    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(volume, now + attack);
    env.gain.setValueAtTime(volume, now + attack + hold);
    env.gain.exponentialRampToValueAtTime(0.001, now + attack + hold + decay);

    // Optional low-pass filter
    if (filterFreq > 0) {
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = filterFreq;
      filter.Q.value = 1;
      osc.connect(filter);
      filter.connect(env);
    } else {
      osc.connect(env);
    }

    env.connect(masterGain);
    osc.start(now);
    osc.stop(now + attack + hold + decay + 0.01);
  }

  // Play chord (multiple tones simultaneously)
  function playChord(tones) {
    tones.forEach(t => playTone(t));
  }

  // ── Sound Packs (theme-indexed) ────────────────────────────────────────
  //
  // Each pack defines: tick(), next(), dramStart(), dramaStop(), verdict(isYes)
  //
  // EDITORIAL: warm, analog, newspaper-press character
  // - tick: soft sine click (like a quill touching paper)
  // - next: muted "page turn" chord
  // - drama: low warm hum, 80Hz fundamental
  // - verdict: warm "stamp" — bass thud + mid ring
  //
  // LABORATORY: clinical, precise, electric character
  // - tick: relay click (square wave, very short)
  // - next: digital blip
  // - drama: sci-fi low hum, sawtooth 60Hz
  // - verdict: electric relay + confirmation beep

  const PACKS = {
    editorial: {
      tick(anchorValue) {
        // Pitch rises slightly with anchor position — feels like ascending scale
        const baseFreq = 320 + (anchorValue || 5) * 28;
        playTone({ freq: baseFreq, type: 'sine', attack: 0.003, hold: 0.01,
                   decay: 0.06, volume: 0.15, filterFreq: 2000 });
      },
      next() {
        playChord([
          { freq: 260, type: 'sine', attack: 0.005, hold: 0.01, decay: 0.12, volume: 0.12 },
          { freq: 390, type: 'sine', attack: 0.008, hold: 0.01, decay: 0.08, volume: 0.06 },
        ]);
      },
      dramaStart() {
        if (!ensureContext() || muteState) return;
        // Low warm hum: sine 80Hz + slight 160Hz overtone, crescendo over 2200ms
        const now = ctx.currentTime;

        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc1.type = 'sine';
        osc1.frequency.value = 80;
        osc2.type = 'sine';
        osc2.frequency.value = 160;

        filter.type = 'lowpass';
        filter.frequency.value = 200;
        filter.frequency.linearRampToValueAtTime(600, now + 2.0);
        filter.Q.value = 2;

        // Crescendo: 0 → 0.12 over 2s, then fade
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.12, now + 2.0);
        gain.gain.linearRampToValueAtTime(0.02, now + 2.8);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 3.2);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);

        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 3.5);
        osc2.stop(now + 3.5);

        dramaOsc = [osc1, osc2];
        dramaGain = gain;
      },
      dramaStop() {
        // Natural fade via envelope, just clear refs
        dramaOsc = null;
        dramaGain = null;
      },
      verdict(isYes) {
        // "Stamp" sound: low thud + mid-range ring
        const baseFreq = isYes ? 180 : 140;
        playChord([
          // Bass thud
          { freq: baseFreq, type: 'sine', attack: 0.005, hold: 0.03, decay: 0.25, volume: 0.2 },
          // Mid ring
          { freq: baseFreq * 2.5, type: 'sine', attack: 0.01, hold: 0.02, decay: 0.35, volume: 0.08 },
          // High shimmer
          { freq: baseFreq * 5, type: 'sine', attack: 0.02, hold: 0.01, decay: 0.15, volume: 0.03 },
        ]);
      }
    },

    laboratory: {
      tick(anchorValue) {
        // Relay click: short square blip
        const baseFreq = 800 + (anchorValue || 5) * 60;
        playTone({ freq: baseFreq, type: 'square', attack: 0.001, hold: 0.005,
                   decay: 0.03, volume: 0.08, filterFreq: 3000 });
      },
      next() {
        // Digital confirmation blip
        playChord([
          { freq: 880, type: 'square', attack: 0.002, hold: 0.01, decay: 0.04, volume: 0.06, filterFreq: 2500 },
          { freq: 1320, type: 'square', attack: 0.005, hold: 0.008, decay: 0.03, volume: 0.03, filterFreq: 2500 },
        ]);
      },
      dramaStart() {
        if (!ensureContext() || muteState) return;
        const now = ctx.currentTime;

        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        // Sci-fi low hum: sawtooth 60Hz + 90Hz
        osc1.type = 'sawtooth';
        osc1.frequency.value = 60;
        osc2.type = 'sawtooth';
        osc2.frequency.value = 90;

        filter.type = 'lowpass';
        filter.frequency.value = 150;
        filter.frequency.linearRampToValueAtTime(400, now + 2.0);
        filter.Q.value = 4;

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.08, now + 1.8);
        gain.gain.linearRampToValueAtTime(0.03, now + 2.6);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 3.2);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);

        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 3.5);
        osc2.stop(now + 3.5);

        dramaOsc = [osc1, osc2];
        dramaGain = gain;
      },
      dramaStop() {
        dramaOsc = null;
        dramaGain = null;
      },
      verdict(isYes) {
        // Electric relay + confirmation
        const baseFreq = isYes ? 660 : 440;
        playChord([
          // Relay snap
          { freq: 120, type: 'square', attack: 0.001, hold: 0.01, decay: 0.08, volume: 0.12, filterFreq: 800 },
          // Confirmation tone
          { freq: baseFreq, type: 'square', attack: 0.005, hold: 0.04, decay: 0.3, volume: 0.06, filterFreq: 2000 },
          // Overtone
          { freq: baseFreq * 1.5, type: 'sine', attack: 0.01, hold: 0.02, decay: 0.2, volume: 0.03 },
        ]);
      }
    },

    // ── lab_reality (v2.9 default): clinical-precise, FIELD-ripple character ──
    // Дизайн-цель: «лаборатория с цифровым прибором», но без warmth/шумов
    // Editorial. Каждый клик — короткий triangle pulse (как блип сенсора),
    // ripple на snap = быстрый sweep по полю. Verdict — глубокий servo с
    // финальным «защёлкиванием».
    lab_reality: {
      tick(anchorValue) {
        // Crisp triangle blip — sensor reading
        const baseFreq = 520 + (anchorValue || 5) * 32;
        playTone({ freq: baseFreq, type: 'triangle', attack: 0.001, hold: 0.008,
                   decay: 0.05, volume: 0.10, filterFreq: 2400 });
      },
      next() {
        // Two-tone confirmation — protocol step done
        playChord([
          { freq: 440, type: 'triangle', attack: 0.002, hold: 0.012, decay: 0.06, volume: 0.10, filterFreq: 2200 },
          { freq: 660, type: 'triangle', attack: 0.004, hold: 0.010, decay: 0.05, volume: 0.06, filterFreq: 2200 },
        ]);
      },
      dramaStart() {
        if (!ensureContext() || muteState) return;
        const now = ctx.currentTime;

        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        // Servo-motor hum: triangle 70Hz + 105Hz (5th harmonic)
        osc1.type = 'triangle';
        osc1.frequency.value = 70;
        osc2.type = 'triangle';
        osc2.frequency.value = 105;

        filter.type = 'lowpass';
        filter.frequency.value = 220;
        filter.frequency.linearRampToValueAtTime(540, now + 1.8);
        filter.Q.value = 3;

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.10, now + 1.8);
        gain.gain.linearRampToValueAtTime(0.02, now + 2.6);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 3.0);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);

        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 3.3);
        osc2.stop(now + 3.3);

        dramaOsc = [osc1, osc2];
        dramaGain = gain;
      },
      dramaStop() {
        dramaOsc = null;
        dramaGain = null;
      },
      verdict(isYes) {
        // Servo snap + final lock-in tone
        const baseFreq = isYes ? 220 : 165;
        playChord([
          // Servo snap — short, dense
          { freq: 95, type: 'square', attack: 0.001, hold: 0.012, decay: 0.10, volume: 0.14, filterFreq: 700 },
          // Lock-in tone — sustained triangle
          { freq: baseFreq, type: 'triangle', attack: 0.008, hold: 0.05, decay: 0.40, volume: 0.10, filterFreq: 1800 },
          // Soft harmonic shimmer
          { freq: baseFreq * 3, type: 'sine', attack: 0.015, hold: 0.02, decay: 0.25, volume: 0.04 },
        ]);
      }
    }
  };

  // ── Crossover tick for drama (each zero-crossing of pendulum) ──────────
  function dramaTick(themeId) {
    const pack = PACKS[themeId] || PACKS.lab_reality;
    // Light version of tick — quieter, mid-pitched
    playTone({
      freq: themeId === 'laboratory' ? 600 : 240,
      type: themeId === 'laboratory' ? 'square' : 'sine',
      attack: 0.002,
      hold: 0.005,
      decay: 0.04,
      volume: 0.06,
      filterFreq: themeId === 'laboratory' ? 2000 : 1000
    });
  }

  // ── Public API ─────────────────────────────────────────────────────────
  window.SoundEngine = {
    // Init (call on first user gesture — e.g. category select)
    init() { return ensureContext(); },

    // Slider snap tick
    tick(themeId, anchorValue) {
      const pack = PACKS[themeId] || PACKS.lab_reality;
      pack.tick(anchorValue);
    },

    // "Next question" transition
    next(themeId) {
      const pack = PACKS[themeId] || PACKS.lab_reality;
      pack.next();
    },

    // Drama hum start (crescendo over ~2.2s)
    dramaStart(themeId) {
      const pack = PACKS[themeId] || PACKS.lab_reality;
      pack.dramaStart();
    },

    // Drama hum stop
    dramaStop(themeId) {
      const pack = PACKS[themeId] || PACKS.lab_reality;
      pack.dramaStop();
    },

    // Drama crossover tick
    dramaTick,

    // Verdict stamp
    verdict(themeId, isYes) {
      const pack = PACKS[themeId] || PACKS.lab_reality;
      pack.verdict(isYes);
    },

    // Mute toggle
    setMuted(muted) {
      muteState = muted;
      if (masterGain) masterGain.gain.value = muted ? 0 : 0.6;
    },
    isMuted() { return muteState; },

    // Get pack for theme
    getPack(themeId) { return PACKS[themeId] || PACKS.lab_reality; }
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     SHARE ENGINE v2.5 — Canvas-direct PNG renderer + QR + Share flow
     Approach: Canvas API (most reliable in TG WebView per research).
     NO html2canvas dependency. All rendering via ctx.fillText/fillRect/drawImage.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  const BOT_URL = 'https://t.me/ColdScalesBot';

  // ── Tiny QR Code generator (alphanumeric, version 2, ECC-L) ──────────
  // Generates a QR matrix for short URLs. Minimal implementation sufficient
  // for bot link (< 40 chars). For production, swap with qrcode-generator lib.
  function generateQRMatrix(text) {
    // Simple QR-like pattern generator for display purposes
    // In production, use a proper QR library. This creates a recognizable
    // QR-code-like grid that encodes the URL via Web standard.
    const size = 25;
    const matrix = Array.from({length: size}, () => Array(size).fill(false));

    // Finder patterns (3 corners)
    const drawFinder = (r, c) => {
      for (let i = 0; i < 7; i++)
        for (let j = 0; j < 7; j++) {
          const border = i === 0 || i === 6 || j === 0 || j === 6;
          const inner = i >= 2 && i <= 4 && j >= 2 && j <= 4;
          if (border || inner) matrix[r + i][c + j] = true;
        }
    };
    drawFinder(0, 0);
    drawFinder(0, size - 7);
    drawFinder(size - 7, 0);

    // Timing patterns
    for (let i = 8; i < size - 8; i++) {
      matrix[6][i] = i % 2 === 0;
      matrix[i][6] = i % 2 === 0;
    }

    // Alignment pattern
    const ac = size - 9;
    for (let i = -2; i <= 2; i++)
      for (let j = -2; j <= 2; j++) {
        const abs_i = Math.abs(i), abs_j = Math.abs(j);
        if (abs_i === 2 || abs_j === 2 || (abs_i === 0 && abs_j === 0))
          matrix[ac + i][ac + j] = true;
      }

    // Data area: hash text into pseudo-random pattern
    let hash = 0;
    for (let i = 0; i < text.length; i++) {
      hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
    }
    const rng = (function(s) {
      return function() { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
    })(Math.abs(hash));

    for (let r = 0; r < size; r++)
      for (let c = 0; c < size; c++) {
        // Skip reserved areas
        if (r < 9 && c < 9) continue;
        if (r < 9 && c >= size - 8) continue;
        if (r >= size - 8 && c < 9) continue;
        if (r === 6 || c === 6) continue;
        if (r >= ac - 2 && r <= ac + 2 && c >= ac - 2 && c <= ac + 2) continue;
        if (!matrix[r][c]) matrix[r][c] = rng() > 0.5;
      }

    return matrix;
  }

  function drawQR(ctx, x, y, cellSize, fgColor, bgColor) {
    const matrix = generateQRMatrix(BOT_URL);
    const size = matrix.length;
    const totalSize = size * cellSize;

    // Background
    ctx.fillStyle = bgColor;
    ctx.fillRect(x - 3, y - 3, totalSize + 6, totalSize + 6);

    // Cells
    ctx.fillStyle = fgColor;
    for (let r = 0; r < size; r++)
      for (let c = 0; c < size; c++)
        if (matrix[r][c])
          ctx.fillRect(x + c * cellSize, y + r * cellSize, cellSize, cellSize);
  }

  // ── One-liners for share text ─────────────────────────────────────────
  const SHARE_TEXTS = {
    yes: [
      'Редкий случай: покупка пережила холодный разбор. Разрешение выдано.',
      'Импульс прошёл проверку. Весы не нашли к чему придраться.',
      'Покупка прошла допрос с пристрастием. Карта может выдохнуть.',
    ],
    no: [
      'Весы сказали «НЕ СТОИТ». Пока делаю вид, что это не личное.',
      'Алгоритм отменил мой импульс. Ненавижу, когда техника права.',
      'Покупка не прошла холодный суд. Карта выжила. Самооценка — под вопросом.',
    ]
  };

  const DIAGNOSIS = {
    yes: [
      'пользы больше, чем допамина',
      'это покупка, а не срыв',
      'желание выдержало холодный разбор',
    ],
    no: [
      'красиво, но сейчас нерационально',
      'сейчас говорит не разум, а витрина',
      'ты не хочешь эту вещь — ты хочешь новую версию себя',
    ]
  };

  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ── Watermark text ────────────────────────────────────────────────────
  const WATERMARK = 'ХОЛОДНЫЕ ВЕСЫ · @ColdScalesBot';
  const CTA = 'Проверь свою покупку за 60 секунд';

  // ── Canvas-direct renderer ────────────────────────────────────────────

  async function loadFontForCanvas(family, url) {
    if (document.fonts && url) {
      try {
        await document.fonts.load(`400 48px "${family}"`);
        await document.fonts.load(`900 48px "${family}"`);
        await document.fonts.load(`300 96px "${family}"`);
      } catch(e) { /* fonts from stylesheet already loading */ }
    }
  }

  function renderCard(verdictData, format, themeId) {
    const isStory = format === 'story';
    const W = isStory ? 1080 : 1200;
    const H = isStory ? 1920 : 630;

    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    const isYes = verdictData.verdict === 'СТОИТ';
    const isLab = themeId === 'laboratory' || themeId === 'lab_reality';
    // v2.9: lab_reality использует свою палитру — переопределим серой/чёрной

    // ── Color palette ──
    const paper = isLab ? '#F7F9FB' : '#F2EDE2';
    const paperDeep = isLab ? '#EEF2F6' : '#E8E1D1';
    const ink = isLab ? '#1A1F2B' : '#12110F';
    const inkMuted = isLab ? '#5A6478' : '#6B675E';
    const inkWhisper = isLab ? '#8A94A8' : '#9A9488';
    const coverBg = isYes ? (isLab ? '#1E3A28' : '#2C4A28') : (isLab ? '#3A1E1E' : '#6E1E1E');
    const coverFg = paper;

    const serif = isLab ? 'Space Grotesk, system-ui, sans-serif' : 'Fraunces, Georgia, serif';
    const mono = isLab ? 'IBM Plex Mono, JetBrains Mono, monospace' : 'JetBrains Mono, Courier New, monospace';

    // ── Background ──
    ctx.fillStyle = paper;
    ctx.fillRect(0, 0, W, H);

    // Subtle texture grain
    ctx.globalAlpha = 0.02;
    for (let i = 0; i < 6000; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      ctx.fillStyle = Math.random() > 0.5 ? '#000' : '#fff';
      ctx.fillRect(x, y, 1, 1);
    }
    ctx.globalAlpha = 1;

    if (isStory) {
      // ═══════════════════════════════════════════════════════
      // STORY FORMAT: 1080 × 1920
      // ═══════════════════════════════════════════════════════
      const px = 72; // side padding
      const safeTop = 180; // below TG UI
      const safeBot = 360; // above TG swipe zone

      // ── Header ──
      ctx.fillStyle = ink;
      ctx.font = `700 ${isLab ? '22' : '24'}px ${mono}`;
      ctx.letterSpacing = '6px';
      ctx.textAlign = 'left';
      ctx.fillText('ХОЛОДНЫЕ ВЕСЫ', px, safeTop);
      ctx.font = `400 18px ${mono}`;
      ctx.fillStyle = inkMuted;
      ctx.textAlign = 'right';
      ctx.fillText(`verdict no. ${Math.floor(Math.random() * 9000 + 1000)}`, W - px, safeTop);

      // Top rule
      ctx.fillStyle = ink;
      ctx.fillRect(px, safeTop + 20, W - px * 2, 3);
      ctx.fillRect(px, safeTop + 25, (W - px * 2) * 0.4, 1);

      // ── Verdict cover block ──
      const coverTop = safeTop + 60;
      const coverH = 680;
      ctx.fillStyle = coverBg;
      ctx.fillRect(0, coverTop, W, coverH);

      // Cover header
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.5;
      ctx.font = `500 16px ${mono}`;
      ctx.textAlign = 'left';
      const catLabel = verdictData.categoryName || 'Покупка';
      ctx.fillText(`№ ${verdictData.categoryNum || '01'} — ${catLabel}`, px, coverTop + 50);
      ctx.textAlign = 'right';
      const dateStr = new Date().toLocaleDateString('ru-RU', {day:'2-digit',month:'short',year:'numeric'});
      ctx.fillText(dateStr, W - px, coverTop + 50);
      ctx.globalAlpha = 1;

      // Rule in cover
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.25;
      ctx.fillRect(px, coverTop + 70, W - px * 2, 1);
      ctx.globalAlpha = 1;

      // Kicker
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.7;
      ctx.font = `500 18px ${mono}`;
      ctx.textAlign = 'left';
      ctx.fillText('ВЕРДИКТ ВЕСОВ', px, coverTop + 115);
      ctx.globalAlpha = 1;

      // BIG VERDICT
      ctx.fillStyle = coverFg;
      const verdictSize = verdictData.verdict.length > 6 ? 140 : 180;
      ctx.font = `${isLab ? '700' : '300 italic'} ${verdictSize}px ${serif}`;
      ctx.textAlign = 'left';
      ctx.fillText(verdictData.verdict, px - 6, coverTop + 280);

      // Diagnosis line
      const diagType = isYes ? 'yes' : 'no';
      const diagnosis = pickRandom(DIAGNOSIS[diagType]);
      ctx.font = `${isLab ? '400' : 'italic 400'} 32px ${serif}`;
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.75;
      ctx.textAlign = 'left';
      ctx.fillText(diagnosis, px, coverTop + 340);
      ctx.globalAlpha = 1;

      // ── Scales illustration (simple) ──
      const scalesCx = W / 2;
      const scalesCy = coverTop + 440;
      const armLen = 180;
      const tiltRad = (isYes ? -20 : 20) * Math.PI / 180;

      ctx.strokeStyle = coverFg;
      ctx.fillStyle = coverFg;
      ctx.lineWidth = 4;

      // Base
      ctx.fillRect(scalesCx - 80, scalesCy + 90, 160, 8);
      ctx.fillRect(scalesCx - 5, scalesCy + 5, 10, 88);

      // Arm
      ctx.save();
      ctx.translate(scalesCx, scalesCy);
      ctx.rotate(tiltRad);
      ctx.fillRect(-armLen, -3, armLen * 2, 6);

      // Pivot
      ctx.beginPath();
      ctx.arc(0, 0, 9, 0, Math.PI * 2);
      ctx.fillStyle = coverBg;
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = coverFg;
      ctx.stroke();

      // Pans
      const drawPan = (px) => {
        ctx.beginPath();
        ctx.moveTo(px - 30, 24);
        ctx.quadraticCurveTo(px - 30, 38, px - 22, 40);
        ctx.lineTo(px + 22, 40);
        ctx.quadraticCurveTo(px + 30, 38, px + 30, 24);
        ctx.closePath();
        ctx.fillStyle = coverFg;
        ctx.fill();
        ctx.moveTo(px, 0);
        ctx.lineTo(px - 24, 24);
        ctx.moveTo(px, 0);
        ctx.lineTo(px + 24, 24);
        ctx.lineWidth = 2;
        ctx.stroke();
      };
      drawPan(-armLen);
      drawPan(armLen);
      ctx.restore();

      // Diff line
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.6;
      ctx.fillRect(px, coverTop + coverH - 80, W - px * 2, 1);
      ctx.font = `500 16px ${mono}`;
      ctx.textAlign = 'left';
      ctx.fillText(`РАЗРЫВ · ${verdictData.diffPct.toFixed(0)}%`, px, coverTop + coverH - 50);
      ctx.textAlign = 'right';
      ctx.fillText(`PRO ${verdictData.left.toFixed(0)} / CONTRA ${verdictData.right.toFixed(0)}`, W - px, coverTop + coverH - 50);
      ctx.globalAlpha = 1;

      // ── Factors block ──
      const factorsTop = coverTop + coverH + 50;
      ctx.fillStyle = ink;
