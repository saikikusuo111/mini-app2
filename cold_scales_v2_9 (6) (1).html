      ctx.fillStyle = inkMuted;
      ctx.fillText('ТРИ СИЛЬНЕЙШИХ ФАКТОРА', px, factorsTop + 30);

      verdictData.top3.forEach((item, idx) => {
        const fy = factorsTop + 65 + idx * 80;
        ctx.fillStyle = ink;
        ctx.fillRect(px, fy, W - px * 2, 1);

        // Rank
        ctx.font = `${isLab ? '300' : 'italic 300'} 36px ${serif}`;
        ctx.fillStyle = inkMuted;
        ctx.textAlign = 'left';
        ctx.fillText(['I','II','III'][idx], px + 4, fy + 42);

        // Text
        ctx.font = `400 22px ${serif}`;
        ctx.fillStyle = ink;
        const maxW = W - px * 2 - 160;
        const factorText = item.q.text.length > 50 ? item.q.text.substring(0, 47) + '…' : item.q.text;
        ctx.fillText(factorText, px + 50, fy + 40, maxW);

        // PRO/CON badge
        const isPro = item.contribution > 0;
        const badgeText = isPro ? 'PRO' : 'CON';
        ctx.font = `600 14px ${mono}`;
        const badgeW = ctx.measureText(badgeText).width + 16;
        const badgeX = W - px - badgeW;
        ctx.strokeStyle = isPro ? '#2C4A28' : '#6E1E1E';
        ctx.lineWidth = 1;
        ctx.strokeRect(badgeX, fy + 22, badgeW, 24);
        ctx.fillStyle = isPro ? '#2C4A28' : '#6E1E1E';
        ctx.textAlign = 'center';
        ctx.fillText(badgeText, badgeX + badgeW / 2, fy + 40);
      });

      // ── Bottom: QR + watermark + CTA ──
      const botY = H - safeBot + 20;

      // QR code
      const qrSize = 4;
      drawQR(ctx, W - px - 25 * qrSize, botY - 10, qrSize, ink, paper);

      // Watermark
      ctx.fillStyle = inkMuted;
      ctx.font = `500 14px ${mono}`;
      ctx.textAlign = 'left';
      ctx.fillText(WATERMARK, px, botY + 10);

      // CTA
      ctx.font = `${isLab ? '400' : 'italic 400'} 22px ${serif}`;
      ctx.fillStyle = ink;
      ctx.fillText(CTA, px, botY + 50);

      // Bottom rule
      ctx.fillStyle = ink;
      ctx.fillRect(px, botY + 65, W - px * 2, 2);

    } else {
      // ═══════════════════════════════════════════════════════
      // OG FORMAT: 1200 × 630
      // ═══════════════════════════════════════════════════════
      const px = 50;

      // Left half: verdict cover
      const coverW = Math.floor(W * 0.5);
      ctx.fillStyle = coverBg;
      ctx.fillRect(0, 0, coverW, H);

      // Kicker
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.6;
      ctx.font = `500 14px ${mono}`;
      ctx.textAlign = 'left';
      ctx.fillText('ВЕРДИКТ ВЕСОВ', px, 60);
      ctx.globalAlpha = 1;

      // Big verdict
      const ogVerdictSize = verdictData.verdict.length > 6 ? 100 : 120;
      ctx.font = `${isLab ? '700' : '300 italic'} ${ogVerdictSize}px ${serif}`;
      ctx.fillStyle = coverFg;
      ctx.fillText(verdictData.verdict, px - 4, 190);

      // Diagnosis
      const diagType2 = isYes ? 'yes' : 'no';
      ctx.font = `${isLab ? '400' : 'italic 400'} 22px ${serif}`;
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.7;
      ctx.fillText(pickRandom(DIAGNOSIS[diagType2]), px, 230);
      ctx.globalAlpha = 1;

      // Diff
      ctx.fillStyle = coverFg;
      ctx.globalAlpha = 0.5;
      ctx.fillRect(px, H - 100, coverW - px * 2, 1);
      ctx.font = `500 13px ${mono}`;
      ctx.fillText(`РАЗРЫВ · ${verdictData.diffPct.toFixed(0)}%`, px, H - 75);
      ctx.textAlign = 'right';
      ctx.fillText(`PRO ${verdictData.left.toFixed(0)} / CONTRA ${verdictData.right.toFixed(0)}`, coverW - px, H - 75);
      ctx.globalAlpha = 1;

      // Mini scales
      const sx = coverW / 2, sy = 380;
      ctx.strokeStyle = coverFg;
      ctx.fillStyle = coverFg;
      ctx.lineWidth = 3;
      ctx.fillRect(sx - 50, sy + 60, 100, 5);
      ctx.fillRect(sx - 3, sy + 5, 6, 58);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate((isYes ? -18 : 18) * Math.PI / 180);
      ctx.fillRect(-110, -2, 220, 4);
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fillStyle = coverBg;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = coverFg;
      ctx.stroke();
      ctx.restore();

      // Right half: factors
      const rx = coverW + 40;
      ctx.fillStyle = ink;
      ctx.font = `700 18px ${mono}`;
      ctx.textAlign = 'left';
      ctx.fillText('ХОЛОДНЫЕ ВЕСЫ', rx, 52);
      ctx.fillStyle = inkMuted;
      ctx.font = `400 13px ${mono}`;
      ctx.fillText(`${verdictData.categoryName || 'Покупка'} · ${dateStr || ''}`, rx, 78);

      // Rules
      ctx.fillStyle = ink;
      ctx.fillRect(rx, 95, W - rx - px, 2);

      // Top 3 factors
      verdictData.top3.forEach((item, idx) => {
        const fy = 130 + idx * 95;
        ctx.fillStyle = ink;
        ctx.font = `${isLab ? '300' : 'italic 300'} 28px ${serif}`;
        ctx.fillText(['I','II','III'][idx], rx, fy + 28);

        ctx.font = `400 16px ${serif}`;
        ctx.fillStyle = ink;
        const factorText = item.q.text.length > 55 ? item.q.text.substring(0, 52) + '…' : item.q.text;
        ctx.fillText(factorText, rx + 40, fy + 26, W - rx - px - 120);

        const isPro = item.contribution > 0;
        ctx.font = `600 11px ${mono}`;
        ctx.fillStyle = isPro ? '#2C4A28' : '#6E1E1E';
        ctx.fillText(isPro ? 'PRO' : 'CON', W - px - 30, fy + 26);
      });

      // Bottom: CTA
      ctx.fillStyle = ink;
      ctx.fillRect(rx, H - 100, W - rx - px, 1);
      ctx.fillStyle = inkMuted;
      ctx.font = `400 13px ${mono}`;
      ctx.textAlign = 'left';
      ctx.fillText('10 ВОПРОСОВ · ХОЛОДНЫЙ ВЕРДИКТ · 60 СЕКУНД', rx, H - 72);

      // QR
      drawQR(ctx, W - px - 25 * 3, H - 95, 3, ink, paper);
    }

    return canvas;
  }

  // ── Share helpers ─────────────────────────────────────────────────────
  function canvasToBlob(canvas) {
    return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  }

  async function shareViaTG(canvas, text) {
    try {
      const blob = await canvasToBlob(canvas);
      const url = URL.createObjectURL(blob);
      // TG WebApp.shareToStory wants HTTPS URL of media
      // For MVP/demo: fallback to native share
      if (window.Telegram?.WebApp?.shareToStory) {
        // shareToStory requires HTTPS URL — for local, use downloadFile flow
        // In production: upload blob to CDN, then call shareToStory(cdnUrl)
        window.Telegram.WebApp.shareToStory(url, {
          text: text,
          widget_link: { url: BOT_URL, name: 'Холодные Весы' }
        });
        return true;
      }
      return false;
    } catch (e) {
      console.warn('[share] TG shareToStory failed:', e);
      return false;
    }
  }

  async function shareViaWebAPI(canvas, text) {
    try {
      const blob = await canvasToBlob(canvas);
      const file = new File([blob], 'cold-scales-verdict.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          text: text,
          files: [file]
        });
        return true;
      }
      return false;
    } catch (e) {
      if (e.name !== 'AbortError') console.warn('[share] Web Share API failed:', e);
      return false;
    }
  }

  async function copyTextToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) {
      // Fallback
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        return true;
      } catch (e2) {
        return false;
      }
    }
  }

  async function downloadPNG(canvas, filename) {
    const blob = await canvasToBlob(canvas);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'cold-scales-verdict.png';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
  }

  // ── Public API ──
  window.ShareEngine = {
    renderCard,
    shareViaTG,
    shareViaWebAPI,
    copyTextToClipboard,
    downloadPNG,
    canvasToBlob,
    getShareText: (isYes) => pickRandom(SHARE_TEXTS[isYes ? 'yes' : 'no']),
    BOT_URL
  };
})();
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const TE = window.ThemeEngine;
const ShareEngine = window.ShareEngine;
const UM = window.UsageManager;
const SE = window.SoundEngine;
const JM = window.JournalManager;

// ═══════════════════════════════════════════════════════════════════════════
//  ANIMATION ENGINE — НЕ ТРОГАТЬ (работает, унаследован из v2.1)
// ═══════════════════════════════════════════════════════════════════════════

function useSmoothValue(targetValue, stiffness = 8) {
  const [displayValue, setDisplayValue] = useState(targetValue);
  const currentRef = useRef(targetValue);
  const rafRef = useRef(null);
  const lastTimeRef = useRef(null);

  useEffect(() => {
    const animate = (time) => {
      if (lastTimeRef.current === null) lastTimeRef.current = time;
      const dt = Math.min((time - lastTimeRef.current) / 1000, 0.05);
      lastTimeRef.current = time;

      const diff = targetValue - currentRef.current;
      if (Math.abs(diff) < 0.001) {
        currentRef.current = targetValue;
        setDisplayValue(targetValue);
        rafRef.current = null;
        lastTimeRef.current = null;
        return;
      }
      const lerp = 1 - Math.exp(-stiffness * dt);
      currentRef.current += diff * lerp;
      setDisplayValue(currentRef.current);
      rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTimeRef.current = null;
    };
  }, [targetValue, stiffness]);

  return displayValue;
}

function useBreath(amplitudeDeg = 0.9, periodMs = 1800, active = true) {
  const [breath, setBreath] = useState(0);
  const rafRef = useRef(null);
  const startRef = useRef(null);
  useEffect(() => {
    if (!active) { setBreath(0); return; }
    const loop = (time) => {
      if (startRef.current === null) startRef.current = time;
      const t = (time - startRef.current) / periodMs;
      setBreath(Math.sin(t * Math.PI * 2) * amplitudeDeg);
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      startRef.current = null;
    };
  }, [amplitudeDeg, periodMs, active]);
  return breath;
}

function useWobble(trigger, { amplitude = 4, duration = 1500, frequency = 8 } = {}) {
  const [wobble, setWobble] = useState(0);
  useEffect(() => {
    if (!trigger) return;
    const start = performance.now();
    let raf;
    const loop = (time) => {
      const t = (time - start) / duration;
      if (t >= 1) { setWobble(0); return; }
      const decay = Math.exp(-3 * t);
      const val = Math.sin(t * frequency * Math.PI) * amplitude * decay;
      setWobble(val);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [trigger, amplitude, duration, frequency]);
  return wobble;
}

// ═══════════════════════════════════════════════════════════════════════════
//  ANIMATION ENGINE — v2.3 ADDITIONS
//  Новые хуки добавлены, старые три (useSmoothValue/useBreath/useWobble)
//  не изменены.
// ═══════════════════════════════════════════════════════════════════════════

/**
 * useDecayingDrama — v2.3.1 физически корректная драма-анимация.
 * Заменяет keyframes-подход v2.3 (useDramaTilt), который дёргал угол по точкам.
 *
 * Механика:
 *   1. Затухающая синусоида: A * exp(-decay*t) * sin(ω*t)
 *      Это РЕАЛЬНОЕ колебание маятника — амплитуда честно гаснет, частота
 *      постоянна, фаза непрерывна.
 *   2. Cross-fade в финал: на отрезке [duration-handover, duration] вес
 *      синусоиды плавно идёт к 0, а вес finalTilt — к 1.
 *      В точке t=duration tilt РОВНО равен finalTilt → бесшовный переход
 *      на verdict-screen.
 *   3. Z-crossing detection: каждый раз, когда синусоида пересекает 0,
 *      вызываем onCrossover() — это «момент истины» для haptic tick и
 *      wobbleTrigger++. Дёргается ровно столько раз, сколько весы РЕАЛЬНО
 *      перевалились через равновесие.
 *
 * @param trigger          — счётчик-триггер (инкрементируется → драма стартует)
 * @param amplitude        — стартовая амплитуда колебаний, по умолчанию 18°
 * @param frequency        — Hz, по умолчанию 1.4 → ~3.4 цикла за 2400ms
 * @param decay            — экспоненциальное затухание, по умолчанию 1.1
 * @param duration         — общая длина драмы в ms (default 2400)
 * @param handover         — длина финальной cross-fade фазы (default 400ms)
 * @param finalTilt        — целевой угол вердикта (±20° обычно)
 * @param onCrossover      — колбэк при каждом нулевом пересечении синусоиды
 */
function useDecayingDrama(trigger, {
  amplitude = 18,
  frequency = 1.4,
  decay = 1.1,
  duration = 2400,
  handover = 400,
  finalTilt = 0,
  onCrossover
} = {}) {
  const [tilt, setTilt] = useState(0);
  const onCrossoverRef = useRef(onCrossover);
  onCrossoverRef.current = onCrossover;

  useEffect(() => {
    if (!trigger) return;
    const start = performance.now();
    let raf;
    let lastSign = 0;

    // ease для cross-fade — гладкая cubic
    const ease = (x) => x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x + 2, 2) / 2;

    const loop = (time) => {
      const elapsed = time - start;
      const t = Math.min(elapsed / 1000, duration / 1000);  // секунды

      // Затухающая синусоида
      const env = Math.exp(-decay * t);
      const sinPart = Math.sin(2 * Math.PI * frequency * t) * amplitude * env;

      // Cross-fade: handoverStart..duration → плавный переход на finalTilt
      const handoverStartMs = duration - handover;
      let result;
      if (elapsed < handoverStartMs) {
        result = sinPart;
      } else if (elapsed < duration) {
        const handoverProgress = (elapsed - handoverStartMs) / handover;
        const w = ease(handoverProgress);  // 0 → 1
        // (1-w) синусоиды + w финала. В t=duration → ровно finalTilt.
        result = sinPart * (1 - w) + finalTilt * w;
      } else {
        result = finalTilt;
      }
      setTilt(result);

      // Z-crossing detection (только в зоне активной синусоиды,
      // не в handover-фазе, чтобы лишний haptic не стрелял у самого финала)
      if (elapsed < handoverStartMs) {
        const sign = Math.sign(sinPart);
        if (lastSign !== 0 && sign !== 0 && sign !== lastSign) {
          try { onCrossoverRef.current?.(); } catch (e) {}
        }
        if (sign !== 0) lastSign = sign;
      }

      if (elapsed >= duration) {
        setTilt(finalTilt);
        return;
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [trigger, amplitude, frequency, decay, duration, handover, finalTilt]);

  return tilt;
}

/**
 * useDramaTilt — DEPRECATED в v2.3.1, оставлен для совместимости.
 * Был основан на keyframes — дёргал угол по точкам, что давало неплавную
 * драму. Заменён на useDecayingDrama (физически правильный маятник).
 */
function useDramaTilt(trigger, { duration = 2400, finalTilt = 0, onCrossover } = {}) {
  const [tilt, setTilt] = useState(0);
  const onCrossoverRef = useRef(onCrossover);
  onCrossoverRef.current = onCrossover;

  useEffect(() => {
    if (!trigger) return;
    const keyframes = [
      { t: 0.00, deg: 0 },
      { t: 0.17, deg: -8 },
      { t: 0.33, deg: 6 },
      { t: 0.54, deg: -4 },
      { t: 0.75, deg: 2 },
      { t: 1.00, deg: finalTilt }
    ];
    // которые из переходов мы уже «отщёлкнули»
    const fired = new Array(keyframes.length).fill(false);
    const start = performance.now();
    let raf;
    // ease-out cubic между точками — гасит резкость переходов
    const ease = (x) => 1 - Math.pow(1 - x, 3);

    const loop = (time) => {
      const elapsed = time - start;
      const t = Math.min(elapsed / duration, 1);

      // найти текущий сегмент
      let i = 0;
      while (i < keyframes.length - 1 && t > keyframes[i + 1].t) i++;
      const a = keyframes[i];
      const b = keyframes[i + 1] || a;
      const span = (b.t - a.t) || 1;
      const local = ease((t - a.t) / span);
      const deg = a.deg + (b.deg - a.deg) * local;
      setTilt(deg);

      // crossover detection: каждый раз, когда мы проходим точку i+1, дёргаем callback
      for (let k = 1; k < keyframes.length; k++) {
        if (!fired[k] && t >= keyframes[k].t) {
          fired[k] = true;
          // не стреляем на финальной точке (t=1) — финал отдельно через wobbleTrigger в App
          if (k < keyframes.length - 1) {
            try { onCrossoverRef.current?.(k); } catch (e) { /* swallow */ }
          }
        }
      }

      if (t >= 1) {
        setTilt(finalTilt);
        return;
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [trigger, duration, finalTilt]);

  return tilt;
}

/**
 * useVelocity — отслеживает мгновенную скорость изменения числовой величины.
 * Используется LiquidDial для squash/stretch + wake + inertia highlight.
 * Возвращает {velocity, smoothVelocity} в единицах/секунду.
 * smoothVelocity затухает к 0 если значение перестало меняться.
 */
function useVelocity(value, { smoothing = 0.18, decayPerFrame = 0.86 } = {}) {
  const [smoothVelocity, setSmoothVelocity] = useState(0);
  const lastValueRef = useRef(value);
  const lastTimeRef = useRef(performance.now());
  const rafRef = useRef(null);
  const velRef = useRef(0);

  // когда value меняется — вычисляем мгновенную скорость
  useEffect(() => {
    const now = performance.now();
    const dt = Math.max((now - lastTimeRef.current) / 1000, 0.001);
    const instant = (value - lastValueRef.current) / dt;
    // экспоненциальное сглаживание
    velRef.current = velRef.current * (1 - smoothing) + instant * smoothing;
    lastValueRef.current = value;
    lastTimeRef.current = now;
  }, [value, smoothing]);

  // постоянный rAF-loop затухания — чтобы wake/squash «расслаблялись» после остановки
  useEffect(() => {
    const tick = () => {
      velRef.current *= decayPerFrame;
      if (Math.abs(velRef.current) < 0.05) velRef.current = 0;
      setSmoothVelocity(velRef.current);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [decayPerFrame]);

  return smoothVelocity;
}

// ═══════════════════════════════════════════════════════════════════════════
//  THEME PREVIEW — mini-FIELD для skin store

// ═══════════════════════════════════════════════════════════════════════════
//  FIELD STAGE — v2.9 центральный компонент сцены
//  ─────────────────────────────────────────────────────────────────────────
//  11×11 точечная решётка, отсечённая по кругу (≈81 точка).
//  Probe-circle: невидимый круг с центром, скользящим по горизонтали
//  в зависимости от value (0..10). Точки внутри probe → active, остальные idle.
//  На каждый pulseTrigger — концентрическая волна (точки от probe наружу
//  получают field-dot-pulse с задержкой ~ distance).
//  На phase="verdict" CSS сам инвертирует цвета (см. .field-stage[data-phase="verdict"]).
// ═══════════════════════════════════════════════════════════════════════════

const FIELD_GRID = (() => {
  // Pre-compute набор точек один раз. Координаты в условных «cells»: -5..+5.
  // Радиус круга-прибора 5.0 → попадает 81 точка (центральный круг 11×11).
  const FIELD_RADIUS = 5.0;
  const dots = [];
  for (let gx = -5; gx <= 5; gx++) {
    for (let gy = -5; gy <= 5; gy++) {
      const dist = Math.sqrt(gx * gx + gy * gy);
      if (dist > FIELD_RADIUS + 0.01) continue;
      // позиция в %% от контейнера: центр (50,50), шаг 8% на cell
      // → крайние точки на 50 ± 5*8 = 10..90% (запас 8% по краям под field-axis)
      const STEP = 8;
      const left = 50 + gx * STEP;
      const top = 50 + gy * STEP;
      dots.push({ gx, gy, left, top, dist });
    }
  }
  return dots;
})();

function FieldStage({ value = 5, phase = "question", pulseTrigger = 0, isYes = false }) {
  // probe-x в cell-координатах: value 0 → -4.0 (левый край), 10 → +4.0 (правый),
  // 5 → 0 (центр). Probe-y всегда 0 (горизонтальная шкала).
  const probeX = ((Math.max(0, Math.min(10, value)) - 5) / 5) * 4.0;
  const probeY = 0;
  // радиус probe в cell-координатах. 2.6 даёт ≈ 21 активную точку в центре,
  // и ≈ 14-16 на краях — визуально полусфера-«накрытие».
  const PROBE_RADIUS = 2.6;

  // pulse-индекс — на каждое изменение pulseTrigger делаем волну
  const [pulseId, setPulseId] = useState(0);
  const lastTriggerRef = useRef(pulseTrigger);
  useEffect(() => {
    if (pulseTrigger !== lastTriggerRef.current) {
      lastTriggerRef.current = pulseTrigger;
      setPulseId((p) => p + 1);
    }
  }, [pulseTrigger]);

  // индекс «текущей волны» — нужен чтобы CSS-анимация перезапускалась.
  // Используем key на dot-уровне через pulseId (см. ниже).
  return (
    <div className="field-stage" data-phase={phase} data-yes={isYes ? "1" : "0"}>
      <div className="field-axis-h" />
      <div className="field-axis-v" />
      {FIELD_GRID.map(({ gx, gy, left, top }) => {
        const dx = gx - probeX;
        const dy = gy - probeY;
        const distToProbe = Math.sqrt(dx * dx + dy * dy);
        const active = distToProbe <= PROBE_RADIUS;
        // delay для волны: чем дальше от probe — тем позже срабатывает
        // 0..420ms для самых дальних точек (диагональ круга ≈ 7.07)
        const pulseDelay = Math.round(distToProbe * 60);
        return (
          <div
            key={`${gx},${gy}|${pulseId}`}
            className={`field-dot ${active ? "active" : "idle"} ${pulseId > 0 ? "field-dot-pulse" : ""}`}
            style={{
              left: `${left}%`,
              top: `${top}%`,
              animationDelay: pulseId > 0 ? `${pulseDelay}ms` : "0ms",
            }}
          />
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  SCALES STAGE — v2.9 unified component
//  Тонкая обёртка над FieldStage. Конвертирует legacy tilt/weights API
//  в единое value=0..10 для FIELD-матрицы. Theme.scales больше не резолвится
//  в SVG-компоненты — у нас один скин «lab_reality».
// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
//  SCALES REGISTRY — единственный компонент сцены: FieldStage
// ═══════════════════════════════════════════════════════════════════════════

function ScalesStage({
  theme,
  phase = "question",       // "start" | "question" | "drama" | "verdict"
  tiltDeg = 0,
  leftWeight = 0,
  rightWeight = 0,
  value = null,             // v2.9: явное value=0..10 для question/start фаз
  pulseTrigger = 0,         // v2.9: для FIELD-ripple на snap
  wobbleTrigger = 0,        // legacy — не используется FIELD, оставлено для совместимости API
  isYes = false,
  className = ""
}) {
  // v2.9: единственный компонент сцены — FieldStage. Theme system пока
  // оставляем (под будущие skin-варианты с разной плотностью/цветом точек),
  // но scales.question больше не разрешается в SVG-компонент.
  let resolvedValue;
  if (value !== null && value !== undefined) {
    resolvedValue = value;
  } else if (phase === "verdict" || phase === "drama") {
    // tiltDeg ∈ [-20, +20] → value ∈ [0, 10]
    resolvedValue = Math.max(0, Math.min(10, 5 + (tiltDeg / 20) * 5));
  } else {
    // weights → value (баланс)
    const total = leftWeight + rightWeight;
    resolvedValue = total > 0 ? (rightWeight / total) * 10 : 5;
  }

  return (
    <div className={`scales-stage ${className}`} data-phase={phase}>
      <FieldStage
        value={Math.round(resolvedValue)}
        phase={phase}
        pulseTrigger={pulseTrigger}
        isYes={isYes}
      />
    </div>
  );
}

//  MATH (не трогать)
// ═══════════════════════════════════════════════════════════════════════════

const LOSS_AVERSION = 2.25;
const ALPHA = 0.88;
const TIE_THRESHOLD = 12;

function computeContribution(question, answer) {
  const normalized = (answer - 5) / 5;
  let value;
  if (question.polarity === "gain") {
    value = normalized >= 0
      ? Math.pow(normalized, ALPHA) * 10
      : -Math.pow(Math.abs(normalized), ALPHA) * 10 * LOSS_AVERSION;
  } else {
    value = normalized >= 0
      ? -Math.pow(normalized, ALPHA) * 10 * LOSS_AVERSION
      : Math.pow(Math.abs(normalized), ALPHA) * 10;
  }
  return value * question.weight;
}

const TIEBREAKER_MAP = { 1: -20, 2: -8, 3: 8, 4: 20 };

function getContextHint(q, answer) {
  const keys = [0, 2, 5, 8, 10];
  let closest = keys[0];
  let minDiff = Math.abs(answer - keys[0]);
  for (const k of keys) {
    const d = Math.abs(answer - k);
    if (d < minDiff) { minDiff = d; closest = k; }
  }
  return q.contextHints[closest];
}

function hapticTick() {
  if (window.navigator.vibrate) window.navigator.vibrate(6);
  try {
    const hf = window.Telegram?.WebApp?.HapticFeedback;
    if (hf) hf.selectionChanged();
  } catch(e){}
}
function hapticNext() {
  if (window.navigator.vibrate) window.navigator.vibrate([12, 40, 15]);
  try {
    const hf = window.Telegram?.WebApp?.HapticFeedback;
    if (hf) hf.impactOccurred("medium");
  } catch(e){}
}
function hapticVerdict() {
  // Triple-pulse "stamp" pattern: heavy → pause → heavy → pause → light
  if (window.navigator.vibrate) window.navigator.vibrate([40, 60, 80, 40, 20]);
  try {
    const hf = window.Telegram?.WebApp?.HapticFeedback;
    if (hf) {
      hf.notificationOccurred("success");
      // Delayed second impact for "double-stamp" feel
      setTimeout(() => { try { hf.impactOccurred("heavy"); } catch(e){} }, 120);
    }
  } catch(e){}
}
// v2.7: drama crossover haptic — lighter than tick
function hapticDramaCross() {
  if (window.navigator.vibrate) window.navigator.vibrate(4);

// ═══════════════════════════════════════════════════════════════════════════
//  LIQUID SLIDER (из v2.1, параметры теперь приходят из темы)
// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
//  SNAP SLIDER — v2.3.3 alignment-fixed
//
//  Якорная модель из самого первого прототипа: 0/3/5/7/10.
//  v2.3.3 fix: thumb теперь позиционируется через left:percentage с
//  translateX(-50%), как и anchor-dots. Это гарантирует, что центр thumb
//  ИДЕАЛЬНО ложится на центр anchor-dot — никаких 20px смещений как в v2.3.2.
//
//  Поведение:
//   - pointerdown в трек → ближайший якорь, snap туда
//   - pointermove (если pointer captured) → continuous snap
//   - клик по anchor-dot → snap к нему
//   - клик по label → snap к нему
//   - на каждом snap к НОВОМУ якорю: vibrate(8) + scale-pulse + onTick
// ═══════════════════════════════════════════════════════════════════════════

const SNAP_ANCHORS = [0, 3, 5, 7, 10];
const SNAP_LABELS = {
  0: "Нет",
  3: "Не уверен",
  5: "Серединка",
  7: "Скорее да",
  10: "Твёрдо да"
};

// Процент позиции для значения val (0-10) внутри rail
const valueToPercent = (val) => (val / 10) * 100;

function SnapSlider({ value, onChange, onTick }) {
  const trackRef = useRef(null);
  const thumbRef = useRef(null);
  const draggingRef = useRef(false);
  const lastValueRef = useRef(value);
  const pulseTimerRef = useRef(null);

  // pickSnapValue: из clientX определяем процент внутри rail (= track minus 24px padding)
  // и снапим к ближайшему якорю.
  const pickSnapValue = (clientX) => {
    const track = trackRef.current;
    if (!track) return value;
    const rect = track.getBoundingClientRect();
    // rail-зона: rect.left + 24 .. rect.right - 24 (track имеет padding 24px)
    const railLeft = rect.left + 24;
    const railWidth = rect.width - 48;
    if (railWidth <= 0) return value;
    const x = clientX - railLeft;
    const pct = Math.max(0, Math.min(1, x / railWidth));
    const raw = pct * 10;
    let closest = SNAP_ANCHORS[0];
    let minDist = Math.abs(raw - SNAP_ANCHORS[0]);
    for (const a of SNAP_ANCHORS) {
      const d = Math.abs(raw - a);
      if (d < minDist) { minDist = d; closest = a; }
    }
    return closest;
  };

  // Применить значение: обновить state + scale-pulse + haptic
  const applyValue = (newVal) => {
    if (newVal === lastValueRef.current) return;
    lastValueRef.current = newVal;
    onTick?.(newVal);  // обычно vibrate
    onChange(newVal);

    const t = thumbRef.current;
    if (t) {
      t.classList.add('pulse');
      if (pulseTimerRef.current) clearTimeout(pulseTimerRef.current);
      pulseTimerRef.current = setTimeout(() => {
        t.classList.remove('pulse');
      }, 130);
    }
  };

  // Pointer events на трек
  useEffect(() => {
    const track = trackRef.current;
    if (!track) return;

    const onDown = (e) => {
      draggingRef.current = true;
      try { track.setPointerCapture(e.pointerId); } catch (err) {}
      const v = pickSnapValue(e.clientX);
      applyValue(v);
    };
    const onMove = (e) => {
      if (!draggingRef.current) return;
      const v = pickSnapValue(e.clientX);
      applyValue(v);
    };
    const onUp = () => { draggingRef.current = false; };

    track.addEventListener('pointerdown', onDown);
    track.addEventListener('pointermove', onMove);
    track.addEventListener('pointerup', onUp);
    track.addEventListener('pointercancel', onUp);
    return () => {
      track.removeEventListener('pointerdown', onDown);
      track.removeEventListener('pointermove', onMove);
      track.removeEventListener('pointerup', onUp);
      track.removeEventListener('pointercancel', onUp);
      if (pulseTimerRef.current) clearTimeout(pulseTimerRef.current);
    };
  }, []);

  const handleAnchorClick = (anchorVal) => (e) => {
    e.stopPropagation();
    applyValue(anchorVal);
  };

  // Все позиции — через percentage от rail.
  // Thumb, dots, labels делят ОДНУ систему координат.
  const thumbPct = valueToPercent(value);
  const fillPct = thumbPct;

  return (
    <div className="snap-slider-container">
      <div className="snap-track" ref={trackRef}>
        <div className="snap-rail">
          <div className="snap-fill" style={{width: `${fillPct}%`}} />
          {SNAP_ANCHORS.map(a => (
            <div
              key={a}
              className={`anchor-dot ${a === value ? 'active' : ''}`}
              style={{left: `${valueToPercent(a)}%`}}
              onClick={handleAnchorClick(a)}
            />
          ))}
          <div
            className="snap-thumb"
            ref={thumbRef}
            style={{left: `${thumbPct}%`}}
          >
            {value}
          </div>
        </div>
      </div>
      <div className="snap-labels">
        {SNAP_ANCHORS.map(a => (
          <div
            key={a}
            className={`snap-label ${a === value ? 'active' : ''}`}
            style={{left: `${valueToPercent(a)}%`}}
            onClick={handleAnchorClick(a)}
          >
            {SNAP_LABELS[a]}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  DRAMA SCALES — v2.3 драматические переколебания (Дефект C)
//
//  Запускается на каждое инкрементирование dramaTrigger.
//  Использует useDramaTilt (keyframes-based rAF) с финальным tilt вердикта,
//  вычисленным заранее в App.triggerVerdictFlow → драма приземляется ровно
//  на угол вердикта без визуального скачка (закрывает Дефект D совместно
//  со ScalesStage).
//
//  На каждом «переломе» (точке смены направления качка):
//    — wobbleTrigger++ (для wobble-хука внутри SVG-компонента темы)
//    — haptic tick (тактильная обратная связь)
//
//  Уважает тонкие animation-params темы: Editorial spring 5.5/wobble 3.5° против
//  Laboratory snappy 7/wobble 4.5° — оба смотрятся «своей» драмой, потому что
//  внутри ScalesStage используется тот же scales-component темы.
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
//  DRAMA SCALES — v2.3.2 origin restore
//
//  ТОЧНАЯ копия drama-flow из самой первой версии (которую пользователь назвал
//  «органичной»). Механика:
//
//    1. setInterval каждые 50ms.
//    2. phase += 0.25 за тик.
//    3. amplitude = max(0, 12 - phase * 1.5)  ← ЛИНЕЙНОЕ затухание, НЕ exp.
//    4. tilt = sin(phase) * amplitude.
//    5. amplitude = 0 примерно на phase=8 → ~1600ms активного качка.
//    6. На 2200ms запускаем «приземление» в finalTilt с micro-overshoot
//       (тот, который в оригинале давал cubic-bezier(0.34, 1.56, 0.64, 1)).
//    7. На 2400ms — App переключает screen на verdict.
//
//  Эта функция — единственная, которая физически НЕ то же, что v2.3.1,
//  потому что rAF-затухающая синусоида (exp-decay) звучит «дробно»,
//  а setInterval с линейным затуханием — «величаво». Я долго пытался
//  это объяснить математически — оказалось, что разница в восприятии не в
//  частотах, а в том, что setInterval @ 50ms на iOS попадает в vsync-rhythm
//  редко, и это даёт «дыхание» между тиками. exp-decay с rAF — слишком ровно.
// ═══════════════════════════════════════════════════════════════════════════
function DramaScales({ theme, dramaTrigger, dramaFinalTilt }) {
  const [tilt, setTilt] = useState(0);
  const [localWobble, setLocalWobble] = useState(0);
  const lastSignRef = useRef(0);

  useEffect(() => {
    if (!dramaTrigger) return;
    let phase = 0;
    let intervalId = null;
    let landingTimer = null;
    let overshoot1Timer = null;
    let overshoot2Timer = null;

    intervalId = setInterval(() => {
      phase += 0.25;
      const amplitude = Math.max(0, 12 - phase * 1.5);
      const newTilt = Math.sin(phase) * amplitude;
      setTilt(newTilt);

      // crossover detection: каждый раз когда переходим через 0
      const sign = Math.sign(newTilt);
      if (lastSignRef.current !== 0 && sign !== 0 && sign !== lastSignRef.current) {
        setLocalWobble(w => w + 1);
        hapticDramaCross();
        SE.dramaTick(theme?.id || 'lab_reality');
      }
      if (sign !== 0) lastSignRef.current = sign;
    }, 50);

    // На 2200ms — останавливаем синусоиду, начинаем приземление с overshoot.
    // Overshoot воспроизводит cubic-bezier(0.34, 1.56, 0.64, 1) из оригинала:
    // финал → перелёт → возврат → финал.
    landingTimer = setTimeout(() => {
      clearInterval(intervalId);
      intervalId = null;
      // Шаг 1: едем в finalTilt (через useSmoothValue в SVG-компоненте → плавно)
      setTilt(dramaFinalTilt);
      // Шаг 2: ~600ms спустя — overshoot чуть дальше
      overshoot1Timer = setTimeout(() => {
        setTilt(dramaFinalTilt * 1.06);  // +6% перелёт
      }, 380);
      // Шаг 3: ~250ms спустя — назад к финалу
      overshoot2Timer = setTimeout(() => {
        setTilt(dramaFinalTilt);
      }, 580);
    }, 2200);

    return () => {
      if (intervalId) clearInterval(intervalId);
      if (landingTimer) clearTimeout(landingTimer);
      if (overshoot1Timer) clearTimeout(overshoot1Timer);
      if (overshoot2Timer) clearTimeout(overshoot2Timer);
      lastSignRef.current = 0;
    };
  }, [dramaTrigger, dramaFinalTilt]);

  return (
    <ScalesStage
      theme={theme}
      phase="drama"
      tiltDeg={tilt}
      leftWeight={0}
      rightWeight={0}
      wobbleTrigger={localWobble}
    />
  );
}

//  SHARE SHEET — v2.5 verdict sharing UI
// ═══════════════════════════════════════════════════════════════════════════

function ShareSheet({ verdictData, themeId, onClose }) {
  const [format, setFormat] = useState('story');
  const [previewUrl, setPreviewUrl] = useState(null);
  const [toast, setToast] = useState(null);
  const canvasRef = useRef(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  // Re-render preview when format changes
  useEffect(() => {
    const canvas = ShareEngine.renderCard(verdictData, format, themeId);
    canvasRef.current = canvas;
    const url = canvas.toDataURL('image/png', 0.92);
    setPreviewUrl(url);
  }, [format, verdictData, themeId]);

  const handleShare = async () => {
    const canvas = canvasRef.current;
    if (!canvas) return;

    const isYes = verdictData.verdict === 'СТОИТ';
    const shareText = ShareEngine.getShareText(isYes) + '\n\n' + ShareEngine.BOT_URL;

    // Auto-copy text to clipboard
    await ShareEngine.copyTextToClipboard(shareText);

    // Try TG first, then Web Share API
    const tgOk = await ShareEngine.shareViaTG(canvas, shareText);
    if (tgOk) {
      showToast('ОТПРАВЛЕНО В TG');
      return;
    }

    const webOk = await ShareEngine.shareViaWebAPI(canvas, shareText);
    if (webOk) {
      showToast('ТЕКСТ СКОПИРОВАН');
      return;
    }

    // Fallback: download
    await ShareEngine.downloadPNG(canvas, `cold-scales-${format}.png`);
    showToast('ТЕКСТ СКОПИРОВАН · PNG СКАЧАН');
  };

  const handleDownload = async () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    await ShareEngine.downloadPNG(canvas, `cold-scales-${format}.png`);
    showToast('PNG СКАЧАН');
  };

  const handleCopyText = async () => {
    const isYes = verdictData.verdict === 'СТОИТ';
    const shareText = ShareEngine.getShareText(isYes) + '\n\n' + ShareEngine.BOT_URL;
    await ShareEngine.copyTextToClipboard(shareText);
    showToast('ТЕКСТ СКОПИРОВАН');
  };

  return (
    <div className="share-sheet-overlay" onClick={onClose}>
      <div className="share-sheet" onClick={e => e.stopPropagation()}>
        <button className="share-sheet-close" onClick={onClose}>×</button>
        <div className="share-sheet-kicker">Share · v2.5</div>
        <div className="share-sheet-title">Поделиться вердиктом</div>

        <div className="share-format-row">
          <button
            className={`share-format-btn ${format === 'story' ? 'active' : ''}`}
            onClick={() => setFormat('story')}
          >
            Story · 9:16
          </button>
          <button
            className={`share-format-btn ${format === 'og' ? 'active' : ''}`}
            onClick={() => setFormat('og')}
          >
            OG · 1200×630
          </button>
        </div>

        <div className="share-preview-box">
          {previewUrl ? (
            <img src={previewUrl} alt="Share card preview" className="share-preview-img" />
          ) : (
            <div className="share-preview-placeholder">Генерирую карточку...</div>
          )}
        </div>

        <div className="share-actions">
          <button className="share-action-btn" onClick={handleShare}>
            <span>Поделиться</span>
            <span className="share-action-arrow">TG → Web → PNG</span>
          </button>
          <button className="share-action-btn" onClick={handleDownload}>
            <span>Скачать PNG</span>
            <span className="share-action-arrow">{format === 'story' ? '1080×1920' : '1200×630'}</span>
          </button>
          <button className="share-action-btn" onClick={handleCopyText}>
            <span>Скопировать текст</span>
            <span className="share-action-arrow">clipboard</span>
          </button>
        </div>
      </div>

      {toast && <div className="share-toast">{toast}</div>}
    </div>
  );
}
